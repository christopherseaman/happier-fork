name: Task / Chore
description: Internal cleanup, refactor, infra, or small scoped work.
labels:
  - "type: task"
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      placeholder: What are we doing?
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope / checklist
      placeholder: |
        - [ ] …
        - [ ] …
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Context (optional)
      description: Links to code, issues, or background.
    validations:
      required: false
