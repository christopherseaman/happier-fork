name: CI — Stress Tests

on:
  workflow_dispatch:
    inputs:
      repeat:
        description: "Repetitions (HAPPIER_E2E_REPEAT)"
        required: true
        default: "10"
        type: string
      seed:
        description: "Seed (HAPPIER_E2E_SEED, empty = random)"
        required: true
        default: ""
        type: string
  schedule:
    # Nightly (UTC)
    - cron: "30 4 * * *"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stress:
    if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/tests.yml
    with:
      run_ui: false
      run_server: false
      run_cli: false
      run_stack: false
      run_typecheck: false
      run_cli_daemon_e2e: false
      run_e2e_core: false
      run_providers: false
      providers_preset: all
      providers_tier: smoke
      run_stress: true
      stress_config: ${{ (github.event_name == 'workflow_dispatch' && format('{{\"repeat\":{0},\"seed\":{1}}}', toJson(inputs.repeat), toJson(inputs.seed))) || '{"repeat":"10","seed":""}' }}
