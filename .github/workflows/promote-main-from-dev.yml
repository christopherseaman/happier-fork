name: PROMOTE — Main from Dev

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Promotion — Mode"
        required: true
        type: choice
        default: fast_forward
        options:
          - fast_forward
          - reset
      dry_run:
        description: "Safety — Only compute and show what would change (no push)"
        required: true
        default: false
        type: boolean
      allow_reset:
        description: "Safety — Required when mode=reset (rewrites main history)"
        required: true
        default: false
        type: boolean
      confirm:
        description: "Confirm — Choose the exact action (mobile-friendly)"
        required: true
        type: choice
        options:
          - promote main from dev
          - reset main from dev

permissions:
  contents: read

concurrency:
  group: promote-main-from-dev
  cancel-in-progress: false

jobs:
  trusted_ref_guard:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce trusted refs for manual dispatch
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]; then
            exit 0
          fi
          case "${GITHUB_REF_NAME}" in
            dev|main) ;;
            *)
              echo "Refusing workflow_dispatch from untrusted ref '${GITHUB_REF_NAME}'. Use dev or main." >&2
              exit 1
              ;;
          esac

  promote:
    needs: [trusted_ref_guard]
    uses: ./.github/workflows/promote-branch.yml
    secrets: inherit
    with:
      source: dev
      target: main
      mode: ${{ inputs.mode }}
      dry_run: ${{ inputs.dry_run }}
      allow_reset: ${{ inputs.allow_reset }}
      confirm: ${{ inputs.confirm }}
