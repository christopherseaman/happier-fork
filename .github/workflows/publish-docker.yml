name: Publish Docker Images

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel (preview or stable)"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - stable
      source_ref:
        description: "Source ref to build from (auto => preview:dev, stable:main)"
        required: true
        default: auto
        type: string
      push_latest:
        description: "Also push the floating channel tag (preview or latest)"
        required: true
        default: true
        type: boolean
      build_relay:
        description: "Build/push relay-server image"
        required: true
        default: true
        type: boolean
      build_devcontainer:
        description: "Build/push devcontainer image"
        required: true
        default: true
        type: boolean
  workflow_call:
    inputs:
      channel:
        required: true
        type: string
      source_ref:
        required: false
        default: auto
        type: string
      push_latest:
        required: false
        default: true
        type: boolean
      build_relay:
        required: false
        default: true
        type: boolean
      build_devcontainer:
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  publish:
    name: Build and push images
    runs-on: ubuntu-latest
    environment: release-shared
    steps:
      - name: Resolve source ref
        id: resolve_source
        shell: bash
        run: |
          set -euo pipefail
          channel="${{ inputs.channel }}"
          src="${{ inputs.source_ref }}"
          if [ "$src" = "auto" ]; then
            if [ "$channel" = "preview" ]; then
              src="dev"
            else
              src="main"
            fi
          fi
          echo "ref=$src" >> "$GITHUB_OUTPUT"

      - name: Guard stable channel
        if: ${{ inputs.channel == 'stable' && steps.resolve_source.outputs.ref != 'main' }}
        run: |
          echo "Stable Docker publishing must build from main (resolved ref: '${{ steps.resolve_source.outputs.ref }}')." >&2
          exit 1

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve_source.outputs.ref }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail

          channel="${{ inputs.channel }}"
          sha="$(git rev-parse HEAD)"
          short_sha="${sha:0:12}"

          if [ "$channel" = "stable" ]; then
            float_tag="latest"
            channel_tag="stable"
          else
            float_tag="preview"
            channel_tag="preview"
          fi

          relay_base="happierdev/relay-server"
          dev_base="happierdev/dev-container"

          relay_tags="${relay_base}:${channel_tag},${relay_base}:${channel_tag}-${short_sha}"
          dev_tags="${dev_base}:${channel_tag},${dev_base}:${channel_tag}-${short_sha}"

          if [ "${{ inputs.push_latest }}" = "true" ]; then
            relay_tags="${relay_tags},${relay_base}:${float_tag}"
            dev_tags="${dev_tags},${dev_base}:${float_tag}"
          fi

          echo "relay_tags=$relay_tags" >> "$GITHUB_OUTPUT"
          echo "dev_tags=$dev_tags" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Build & push relay-server
        if: ${{ inputs.build_relay == true }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: relay-server
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            HAPPIER_EMBEDDED_POLICY_ENV=${{ inputs.channel == 'stable' && 'production' || 'preview' }}
          tags: ${{ steps.tags.outputs.relay_tags }}
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ steps.tags.outputs.sha }}

      - name: Build & push devcontainer
        if: ${{ inputs.build_devcontainer == true }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/devcontainer/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.dev_tags }}
          labels: |
            org.opencontainers.image.source=${{ github.repositoryUrl }}
            org.opencontainers.image.revision=${{ steps.tags.outputs.sha }}
