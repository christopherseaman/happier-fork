name: Publish Docker Images

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel (preview or stable)"
        required: true
        default: "preview"
        type: choice
        options:
          - preview
          - stable
      source_ref:
        description: "Source ref to build from (auto => preview:dev, stable:main)"
        required: true
        default: auto
        type: string
      push_latest:
        description: "Also push the floating channel tag (preview or latest)"
        required: true
        default: true
        type: boolean
      build_relay:
        description: "Build/push relay-server image"
        required: true
        default: true
        type: boolean
      build_devcontainer:
        description: "Build/push devcontainer image"
        required: true
        default: true
        type: boolean
  workflow_call:
    inputs:
      channel:
        required: true
        type: string
      source_ref:
        required: false
        default: auto
        type: string
      push_latest:
        required: false
        default: true
        type: boolean
      build_relay:
        required: false
        default: true
        type: boolean
      build_devcontainer:
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  release_actor_guard:
    name: Release actor guard
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Authorize release actor
        uses: ./.github/actions/release-actor-guard
        with:
          team_slug: release-admins
          app_id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private_key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

  publish:
    name: Build and push images
    needs: [release_actor_guard]
    runs-on: ubuntu-latest
    environment: release-shared
    steps:
      - name: Resolve source ref
        id: resolve_source
        shell: bash
        run: |
          set -euo pipefail
          channel="${{ inputs.channel }}"
          src="${{ inputs.source_ref }}"
          if [ "$src" = "auto" ]; then
            if [ "$channel" = "preview" ]; then
              src="dev"
            else
              src="main"
            fi
          fi
          echo "ref=$src" >> "$GITHUB_OUTPUT"

      - name: Guard stable channel
        if: ${{ inputs.channel == 'stable' && steps.resolve_source.outputs.ref != 'main' }}
        run: |
          echo "Stable Docker publishing must build from main (resolved ref: '${{ steps.resolve_source.outputs.ref }}')." >&2
          exit 1

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve_source.outputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push images (pipeline)
        env:
          PIPELINE_DOCKER_REGISTRIES: dockerhub,ghcr
          GHCR_NAMESPACE: ghcr.io/happier-dev
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          node scripts/pipeline/docker/publish-images.mjs \
            --channel "${{ inputs.channel }}" \
            --push-latest "${{ inputs.push_latest }}" \
            --build-relay "${{ inputs.build_relay }}" \
            --build-devcontainer "${{ inputs.build_devcontainer }}"

      - name: Update Docker Hub README (relay-server)
        if: ${{ inputs.build_relay }}
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: happierdev/relay-server
          readme-filepath: docker/dockerhub/relay-server.md
          short-description: Self-host the Happier Server (Docker image)

      - name: Update Docker Hub README (dev-box)
        if: ${{ inputs.build_devcontainer }}
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: happierdev/dev-box
          readme-filepath: docker/dockerhub/dev-box.md
          short-description: Happier dev box (CLI + daemon in Docker)
