name: RELEASE — npm publish (cli/stack)

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Target — Release channel"
        required: true
        type: choice
        options:
          - production
          - preview
      run_tests:
        description: "Checks — Run publish checks/tests before publishing"
        required: true
        default: true
        type: boolean
      publish_cli:
        description: "Publish (CLI) — Publish CLI to npm"
        required: true
        default: true
        type: boolean
      bump:
        description: "Publish (CLI) — Version bump on main (set none if already bumped)"
        required: true
        type: choice
        options:
          - none
          - patch
          - minor
          - major
      npm_tag:
        description: "Publish (CLI) — npm dist-tag (production: latest, preview: next)"
        required: true
        default: latest
        type: choice
        options:
          - latest
          - next
      publish_stack:
        description: "Publish (Stack) — Publish Stack app to npm"
        required: true
        default: false
        type: boolean
      stack_bump:
        description: "Publish (Stack) — Version bump on main (set none if already bumped)"
        required: true
        type: choice
        default: none
        options:
          - none
          - patch
          - minor
          - major
      update_deploy_branch:
        description: "Deploy — Also promote main to deploy/<channel>/* (optional audit trail)"
        required: true
        default: false
        type: boolean
  workflow_call:
    inputs:
      channel:
        description: "Target — Release channel"
        required: true
        type: string
      run_tests:
        description: "Checks — Run publish checks/tests before publishing"
        required: false
        default: true
        type: boolean
      publish_cli:
        description: "Publish (CLI) — Publish CLI to npm"
        required: false
        default: true
        type: boolean
      bump:
        description: "Publish (CLI) — Version bump on main (set none if already bumped)"
        required: true
        type: string
      npm_tag:
        description: "Publish (CLI) — npm dist-tag (production: latest, preview: next)"
        required: false
        default: latest
        type: string
      publish_stack:
        description: "Publish (Stack) — Publish Stack app to npm"
        required: false
        default: false
        type: boolean
      stack_bump:
        description: "Publish (Stack) — Version bump on main (set none if already bumped)"
        required: false
        default: none
        type: string
      update_deploy_branch:
        description: "Deploy — Also promote main to deploy/<channel>/* (optional audit trail)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    permissions:
      contents: write
      id-token: write
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
      channel: ${{ steps.meta.outputs.channel }}
      npm_tag: ${{ steps.meta.outputs.npm_tag }}
      cli_version: ${{ steps.meta.outputs.cli_version }}
      stack_version: ${{ steps.meta.outputs.stack_version }}
    steps:
      - name: Validate inputs
        env:
          INPUT_CHANNEL: ${{ inputs.channel }}
          INPUT_NPM_TAG: ${{ inputs.npm_tag }}
          INPUT_PUBLISH_CLI: ${{ inputs.publish_cli }}
          INPUT_PUBLISH_STACK: ${{ inputs.publish_stack }}
          INPUT_BUMP: ${{ inputs.bump }}
          INPUT_STACK_BUMP: ${{ inputs.stack_bump }}
        run: |
          set -euo pipefail
          if [ "${INPUT_PUBLISH_CLI}" != "true" ] && [ "${INPUT_PUBLISH_STACK}" != "true" ]; then
            echo "At least one of publish_cli or publish_stack must be true." >&2
            exit 1
          fi
          expected_tag="latest"
          if [ "${INPUT_CHANNEL}" = "preview" ]; then
            expected_tag="next"
          fi
          if [ "${INPUT_NPM_TAG}" != "${expected_tag}" ]; then
            echo "npm_tag must be '${expected_tag}' for channel='${INPUT_CHANNEL}' (got '${INPUT_NPM_TAG}')." >&2
            exit 1
          fi
          if [ "${INPUT_CHANNEL}" = "preview" ]; then
            if [ "${INPUT_BUMP}" != "none" ] || [ "${INPUT_STACK_BUMP}" != "none" ]; then
              echo "::warning::Preview channel ignores bump/stack_bump (versions are set to X.Y.Z-preview.<run>.<attempt> in the working tree only)."
            fi
          fi

      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Setup Corepack (Yarn 1.22.22)
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Install dependencies
        env:
          YARN_PRODUCTION: "false"
          npm_config_production: "false"
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Set preview versions (working tree only)
        if: inputs.channel == 'preview'
        run: |
          set -euo pipefail
          node - <<'NODE'
          const { readFileSync, writeFileSync } = require('node:fs');
          const { join } = require('node:path');
          function normalizeBase(version) {
            const m = String(version ?? '').trim().match(/^(\d+)\.(\d+)\.(\d+)/);
            if (!m) throw new Error(`Invalid version: ${version}`);
            return `${m[1]}.${m[2]}.${m[3]}`;
          }
          function setPreviewVersion(pkgPath) {
            const raw = JSON.parse(readFileSync(pkgPath, 'utf-8'));
            const base = normalizeBase(raw.version);
            const runNumberRaw = Number(process.env.GITHUB_RUN_NUMBER ?? '0');
            const run = Number.isFinite(runNumberRaw) ? Math.max(0, Math.floor(runNumberRaw)) : 0;
            const runAttemptRaw = Number(process.env.GITHUB_RUN_ATTEMPT ?? '1');
            const attempt = Number.isFinite(runAttemptRaw) ? Math.max(1, Math.floor(runAttemptRaw)) : 1;
            raw.version = `${base}-preview.${run}.${attempt}`;
            writeFileSync(pkgPath, JSON.stringify(raw, null, 2) + '\n', 'utf-8');
            return raw.version;
          }
          const versions = {};
          if (process.env.PUBLISH_CLI === 'true') {
            versions.cli = setPreviewVersion(join('apps', 'cli', 'package.json'));
          }
          if (process.env.PUBLISH_STACK === 'true') {
            versions.stack = setPreviewVersion(join('apps', 'stack', 'package.json'));
          }
          console.log(JSON.stringify(versions));
          NODE
        env:
          PUBLISH_CLI: ${{ inputs.publish_cli }}
          PUBLISH_STACK: ${{ inputs.publish_stack }}

      - name: Bump cli version (main)
        id: bump_cli
        if: inputs.channel == 'production'
        run: |
          set -euo pipefail
          if [ "${{ inputs.publish_cli }}" != "true" ] || [ "${{ inputs.bump }}" = "none" ]; then
            echo "version=SKIP" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          out="$(node scripts/release/bump-version.mjs --component cli --bump "${{ inputs.bump }}")"
          echo "version=$out" >> "$GITHUB_OUTPUT"

      - name: Bump stack version (main)
        id: bump_stack
        if: inputs.channel == 'production'
        run: |
          set -euo pipefail
          if [ "${{ inputs.publish_stack }}" != "true" ] || [ "${{ inputs.stack_bump }}" = "none" ]; then
            echo "version=SKIP" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          cd apps/stack
          npm version "${{ inputs.stack_bump }}" --no-git-tag-version >/tmp/bump_stack.txt
          # `npm version` outputs "vX.Y.Z"
          v="$(cat /tmp/bump_stack.txt | tr -d '\n' | sed 's/^v//')"
          if [ -z "${v:-}" ]; then
            echo "Failed to determine bumped stack version." >&2
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Run cli tests
        if: inputs.publish_cli && inputs.run_tests
        run: |
          yarn --cwd apps/cli test:unit
          yarn --cwd apps/cli test:integration

      - name: Run stack tests
        if: inputs.publish_stack && inputs.run_tests
        run: |
          yarn --cwd apps/stack test:unit
          yarn --cwd apps/stack test:integration

      - name: Commit version bump(s) (main)
        if: inputs.channel == 'production' && (steps.bump_cli.outputs.version != 'SKIP' || steps.bump_stack.outputs.version != 'SKIP')
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          bumped=()
          if [ "${{ steps.bump_cli.outputs.version }}" != "SKIP" ]; then
            git add apps/cli/package.json
            bumped+=("cli")
          fi
          if [ "${{ steps.bump_stack.outputs.version }}" != "SKIP" ]; then
            git add apps/stack/package.json
            bumped+=("stack")
          fi

          if [ "${#bumped[@]}" -eq 0 ]; then
            echo "No version bumps requested." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          git commit -m "chore(release): bump versions (${bumped[*]})"

      - name: Push main
        if: inputs.channel == 'production' && (steps.bump_cli.outputs.version != 'SKIP' || steps.bump_stack.outputs.version != 'SKIP')
        run: git push origin HEAD:main

      - name: Release metadata
        id: meta
        env:
          INPUT_CHANNEL: ${{ inputs.channel }}
          INPUT_PUBLISH_CLI: ${{ inputs.publish_cli }}
          INPUT_PUBLISH_STACK: ${{ inputs.publish_stack }}
        run: |
          set -euo pipefail
          sha="$(git rev-parse HEAD)"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "channel=${INPUT_CHANNEL}" >> "$GITHUB_OUTPUT"
          if [ "${INPUT_CHANNEL}" = "preview" ]; then
            echo "npm_tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
          fi
          if [ "${INPUT_PUBLISH_CLI}" = "true" ]; then
            echo "cli_version=$(node -p 'require(\"./apps/cli/package.json\").version')" >> "$GITHUB_OUTPUT"
          else
            echo "cli_version=SKIP" >> "$GITHUB_OUTPUT"
          fi
          if [ "${INPUT_PUBLISH_STACK}" = "true" ]; then
            echo "stack_version=$(node -p 'require(\"./apps/stack/package.json\").version')" >> "$GITHUB_OUTPUT"
          else
            echo "stack_version=SKIP" >> "$GITHUB_OUTPUT"
          fi

      - name: npm publish
        if: inputs.publish_cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN is required for npm publish." >&2
            exit 1
          fi
          cd apps/cli
          yarn prepublishOnly
          npm publish --provenance --access public --tag "${{ steps.meta.outputs.npm_tag }}"

      - name: npm pack (cli)
        if: inputs.publish_cli
        run: |
          set -euo pipefail
          mkdir -p dist/release-assets/cli
          cd apps/cli
          pack_json="$(npm pack --json)"
          tgz="$(
            PACK_JSON="${pack_json}" node -e '
              const raw = (process.env.PACK_JSON ?? "").trim();
              const parsed = raw ? JSON.parse(raw) : [];
              const entry = Array.isArray(parsed) ? parsed[0] : parsed;
              const filename = typeof entry?.filename === "string" ? entry.filename.trim() : "";
              if (!filename) process.exit(1);
              process.stdout.write(filename);
            '
          )" || {
            echo "npm pack --json did not return a valid filename" >&2
            exit 1
          }
          if [ -z "${tgz:-}" ] || [ ! -f "$tgz" ] || [ "${tgz##*.}" != "tgz" ]; then
            echo "npm pack did not produce an expected .tgz file: '$tgz'" >&2
            exit 1
          fi
          mv "$tgz" "../../dist/release-assets/cli/cli-${{ steps.meta.outputs.cli_version }}.tgz"

      - name: Upload npm pack artifact (cli)
        if: inputs.publish_cli
        uses: actions/upload-artifact@v4
        with:
          name: npm-pack-cli
          path: dist/release-assets/cli
          if-no-files-found: error

      - name: npm publish (stack)
        if: inputs.publish_stack
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN is required for npm publish." >&2
            exit 1
          fi
          cd apps/stack
          npm publish --provenance --access public --tag "${{ steps.meta.outputs.npm_tag }}"

      - name: npm pack (stack)
        if: inputs.publish_stack
        run: |
          set -euo pipefail
          mkdir -p dist/release-assets/stack
          cd apps/stack
          pack_json="$(npm pack --json)"
          tgz="$(
            PACK_JSON="${pack_json}" node -e '
              const raw = (process.env.PACK_JSON ?? "").trim();
              const parsed = raw ? JSON.parse(raw) : [];
              const entry = Array.isArray(parsed) ? parsed[0] : parsed;
              const filename = typeof entry?.filename === "string" ? entry.filename.trim() : "";
              if (!filename) process.exit(1);
              process.stdout.write(filename);
            '
          )" || {
            echo "npm pack --json did not return a valid filename" >&2
            exit 1
          }
          if [ -z "${tgz:-}" ] || [ ! -f "$tgz" ] || [ "${tgz##*.}" != "tgz" ]; then
            echo "npm pack did not produce an expected .tgz file: '$tgz'" >&2
            exit 1
          fi
          mv "$tgz" "../../dist/release-assets/stack/stack-${{ steps.meta.outputs.stack_version }}.tgz"

      - name: Upload npm pack artifact (stack)
        if: inputs.publish_stack
        uses: actions/upload-artifact@v4
        with:
          name: npm-pack-stack
          path: dist/release-assets/stack
          if-no-files-found: error

      - name: Promote main to deploy branch (cli) (optional)
        if: inputs.update_deploy_branch && inputs.publish_cli
        env:
          DEPLOY_REF: deploy/${{ inputs.channel }}/cli
        run: |
          set -euo pipefail
          remote_sha="$(git ls-remote --heads origin "$DEPLOY_REF" | awk '{print $1}')"
          if [ -n "$remote_sha" ]; then
            git push origin HEAD:"$DEPLOY_REF" --force-with-lease="refs/heads/$DEPLOY_REF:$remote_sha"
          else
            git push origin HEAD:"$DEPLOY_REF"
          fi

      - name: Promote main to deploy branch (stack) (optional)
        if: inputs.update_deploy_branch && inputs.publish_stack
        env:
          DEPLOY_REF: deploy/${{ inputs.channel }}/stack
        run: |
          set -euo pipefail
          remote_sha="$(git ls-remote --heads origin "$DEPLOY_REF" | awk '{print $1}')"
          if [ -n "$remote_sha" ]; then
            git push origin HEAD:"$DEPLOY_REF" --force-with-lease="refs/heads/$DEPLOY_REF:$remote_sha"
          else
            git push origin HEAD:"$DEPLOY_REF"
          fi

      - name: Step summary
        if: always()
        env:
          INPUT_CHANNEL: ${{ inputs.channel }}
          INPUT_PUBLISH_CLI: ${{ inputs.publish_cli }}
          INPUT_PUBLISH_STACK: ${{ inputs.publish_stack }}
        run: |
          npm_tag="${{ steps.meta.outputs.npm_tag }}"
          cli_version="${{ steps.meta.outputs.cli_version }}"
          stack_version="${{ steps.meta.outputs.stack_version }}"
          [ -n "${npm_tag}" ] || npm_tag="(unavailable)"
          [ -n "${cli_version}" ] || cli_version="(unavailable)"
          [ -n "${stack_version}" ] || stack_version="(unavailable)"

          {
            echo "### npm publish"
            echo ""
            echo "- channel: \`${INPUT_CHANNEL}\`"
            echo "- npm dist-tag: \`${npm_tag}\`"
            if [ "${INPUT_PUBLISH_CLI}" = "true" ]; then
              echo "- cli: \`${cli_version}\`"
            fi
            if [ "${INPUT_PUBLISH_STACK}" = "true" ]; then
              echo "- stack: \`${stack_version}\`"
            fi
            echo ""
            echo "### GitHub Releases (mirror)"
            echo ""
            if [ "${INPUT_CHANNEL}" = "preview" ]; then
              if [ "${INPUT_PUBLISH_CLI}" = "true" ]; then echo "- \`cli-preview\` (rolling prerelease)"; fi
              if [ "${INPUT_PUBLISH_STACK}" = "true" ]; then echo "- \`stack-preview\` (rolling prerelease)"; fi
            else
              if [ "${INPUT_PUBLISH_CLI}" = "true" ]; then echo "- \`cli-v${cli_version}\`"; fi
              if [ "${INPUT_PUBLISH_STACK}" = "true" ]; then echo "- \`stack-v${stack_version}\`"; fi
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  mirror-cli-stable:
    if: ${{ needs.release.outputs.channel == 'production' && needs.release.outputs.cli_version != 'SKIP' }}
    needs: release
    uses: ./.github/workflows/publish-github-release.yml
    secrets: inherit
    with:
      tag: cli-v${{ needs.release.outputs.cli_version }}
      title: CLI v${{ needs.release.outputs.cli_version }}
      target_sha: ${{ needs.release.outputs.sha }}
      prerelease: false
      rolling_tag: false
      generate_notes: true
      clobber: true
      assets_artifact: npm-pack-cli
      assets_artifact_path: dist/release-assets/cli
      assets_dir: dist/release-assets/cli

  mirror-cli-preview:
    if: ${{ needs.release.outputs.channel == 'preview' && needs.release.outputs.cli_version != 'SKIP' }}
    needs: release
    uses: ./.github/workflows/publish-github-release.yml
    secrets: inherit
    with:
      tag: cli-preview
      title: CLI Preview
      target_sha: ${{ needs.release.outputs.sha }}
      prerelease: true
      rolling_tag: true
      generate_notes: false
      notes: "Rolling preview build (npm dist-tag: next)."
      clobber: true
      assets_artifact: npm-pack-cli
      assets_artifact_path: dist/release-assets/cli
      assets_dir: dist/release-assets/cli

  mirror-stack-stable:
    if: ${{ needs.release.outputs.channel == 'production' && needs.release.outputs.stack_version != 'SKIP' }}
    needs: release
    uses: ./.github/workflows/publish-github-release.yml
    secrets: inherit
    with:
      tag: stack-v${{ needs.release.outputs.stack_version }}
      title: Stack v${{ needs.release.outputs.stack_version }}
      target_sha: ${{ needs.release.outputs.sha }}
      prerelease: false
      rolling_tag: false
      generate_notes: true
      clobber: true
      assets_artifact: npm-pack-stack
      assets_artifact_path: dist/release-assets/stack
      assets_dir: dist/release-assets/stack

  mirror-stack-preview:
    if: ${{ needs.release.outputs.channel == 'preview' && needs.release.outputs.stack_version != 'SKIP' }}
    needs: release
    uses: ./.github/workflows/publish-github-release.yml
    secrets: inherit
    with:
      tag: stack-preview
      title: Stack Preview
      target_sha: ${{ needs.release.outputs.sha }}
      prerelease: true
      rolling_tag: true
      generate_notes: false
      notes: "Rolling preview build (npm dist-tag: next)."
      clobber: true
      assets_artifact: npm-pack-stack
      assets_artifact_path: dist/release-assets/stack
      assets_dir: dist/release-assets/stack
