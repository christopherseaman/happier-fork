name: RELEASE — npm publish (cli/stack/server)

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Target — Release channel"
        required: true
        type: choice
        options:
          - production
          - preview
      source_ref:
        description: "Promotion — Source ref to release from (auto: preview→dev, production→main)"
        required: true
        default: auto
        type: string
      run_tests:
        description: "Checks — Run publish checks/tests before publishing"
        required: true
        default: true
        type: boolean
      publish_cli:
        description: "Publish (CLI) — Publish CLI to npm"
        required: true
        default: true
        type: boolean
      npm_tag:
        description: "Publish (CLI) — npm dist-tag (production: latest, preview: next)"
        required: true
        default: latest
        type: choice
        options:
          - latest
          - next
      publish_stack:
        description: "Publish (Stack) — Publish Stack app to npm"
        required: true
        default: false
        type: boolean
      publish_server:
        description: "Publish (Server) — Publish server runner (@happier-dev/server) to npm"
        required: true
        default: false
        type: boolean
  workflow_call:
    inputs:
      channel:
        description: "Target — Release channel"
        required: true
        type: string
      source_ref:
        description: "Promotion — Source ref to release from (auto: preview→dev, production→main)"
        required: false
        default: auto
        type: string
      run_tests:
        description: "Checks — Run publish checks/tests before publishing"
        required: false
        default: true
        type: boolean
      publish_cli:
        description: "Publish (CLI) — Publish CLI to npm"
        required: false
        default: true
        type: boolean
      npm_tag:
        description: "Publish (CLI) — npm dist-tag (production: latest, preview: next)"
        required: false
        default: latest
        type: string
      publish_stack:
        description: "Publish (Stack) — Publish Stack app to npm"
        required: false
        default: false
        type: boolean
      publish_server:
        description: "Publish (Server) — Publish server runner (@happier-dev/server) to npm"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    permissions:
      contents: write
      id-token: write
    runs-on: ubuntu-latest
    environment: release-shared
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
      source_ref: ${{ steps.meta.outputs.source_ref }}
      channel: ${{ steps.meta.outputs.channel }}
      npm_tag: ${{ steps.meta.outputs.npm_tag }}
      cli_version: ${{ steps.meta.outputs.cli_version }}
      stack_version: ${{ steps.meta.outputs.stack_version }}
      server_version: ${{ steps.meta.outputs.server_version }}
    steps:
      - name: Validate inputs
        env:
          INPUT_CHANNEL: ${{ inputs.channel }}
          INPUT_NPM_TAG: ${{ inputs.npm_tag }}
          INPUT_PUBLISH_CLI: ${{ inputs.publish_cli }}
          INPUT_PUBLISH_STACK: ${{ inputs.publish_stack }}
          INPUT_PUBLISH_SERVER: ${{ inputs.publish_server }}
        run: |
          set -euo pipefail
          if [ "${INPUT_PUBLISH_CLI}" != "true" ] && [ "${INPUT_PUBLISH_STACK}" != "true" ] && [ "${INPUT_PUBLISH_SERVER}" != "true" ]; then
            echo "At least one of publish_cli, publish_stack, or publish_server must be true." >&2
            exit 1
          fi
          expected_tag="latest"
          if [ "${INPUT_CHANNEL}" = "preview" ]; then
            expected_tag="next"
          fi
          if [ "${INPUT_NPM_TAG}" != "${expected_tag}" ]; then
            echo "npm_tag must be '${expected_tag}' for channel='${INPUT_CHANNEL}' (got '${INPUT_NPM_TAG}')." >&2
            exit 1
          fi

      - name: Resolve source ref
        id: resolve_source
        env:
          INPUT_CHANNEL: ${{ inputs.channel }}
          INPUT_SOURCE_REF: ${{ inputs.source_ref }}
        run: |
          set -euo pipefail
          channel="${INPUT_CHANNEL}"
          src="${INPUT_SOURCE_REF}"
          if [ "$src" = "auto" ]; then
            if [ "$channel" = "preview" ]; then
              src="dev"
            else
              src="main"
            fi
          fi

          if [ "$channel" = "preview" ] && [ "$src" != "dev" ]; then
            echo "Preview releases must run from dev (got source_ref='${src}')." >&2
            exit 1
          fi
          if [ "$channel" = "production" ] && [ "$src" != "main" ]; then
            echo "Production releases must run from main (got source_ref='${src}')." >&2
            exit 1
          fi

          echo "ref=$src" >> "$GITHUB_OUTPUT"

      - name: Enforce trusted refs for manual dispatch
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]; then
            exit 0
          fi
          case "${GITHUB_REF_NAME}" in
            dev|main) ;;
            *)
              echo "Refusing workflow_dispatch from untrusted ref '${GITHUB_REF_NAME}'. Use dev or main." >&2
              exit 1
              ;;
          esac

      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Checkout source ref
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve_source.outputs.ref }}
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          registry-url: https://registry.npmjs.org
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Upgrade npm for trusted publishing (OIDC)
        run: |
          set -euo pipefail
          npm install --global npm@11.5.1
          npm --version

      - name: Setup Corepack (Yarn 1.22.22)
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        env:
          YARN_PRODUCTION: "false"
          npm_config_production: "false"
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Run release contract tests
        run: yarn -s test:release:contracts

      - name: Verify installer assets are synced
        run: node scripts/release/sync-installers.mjs --check

      - name: Set preview versions (working tree only)
        if: inputs.channel == 'preview'
        run: |
          set -euo pipefail
          node - <<'NODE'
          const { readFileSync, writeFileSync } = require('node:fs');
          const { join } = require('node:path');
          function normalizeBase(version) {
            const m = String(version ?? '').trim().match(/^(\d+)\.(\d+)\.(\d+)/);
            if (!m) throw new Error(`Invalid version: ${version}`);
            return `${m[1]}.${m[2]}.${m[3]}`;
          }
          function setPreviewVersion(pkgPath) {
            const raw = JSON.parse(readFileSync(pkgPath, 'utf-8'));
            const base = normalizeBase(raw.version);
            const runNumberRaw = Number(process.env.GITHUB_RUN_NUMBER ?? '0');
            const run = Number.isFinite(runNumberRaw) ? Math.max(0, Math.floor(runNumberRaw)) : 0;
            const runAttemptRaw = Number(process.env.GITHUB_RUN_ATTEMPT ?? '1');
            const attempt = Number.isFinite(runAttemptRaw) ? Math.max(1, Math.floor(runAttemptRaw)) : 1;
            raw.version = `${base}-preview.${run}.${attempt}`;
            writeFileSync(pkgPath, JSON.stringify(raw, null, 2) + '\n', 'utf-8');
            return raw.version;
          }
          const versions = {};
          if (process.env.PUBLISH_CLI === 'true') {
            versions.cli = setPreviewVersion(join('apps', 'cli', 'package.json'));
          }
          if (process.env.PUBLISH_STACK === 'true') {
            versions.stack = setPreviewVersion(join('apps', 'stack', 'package.json'));
          }
          if (process.env.PUBLISH_RELAY_SERVER === 'true') {
            versions.relayServer = setPreviewVersion(join('packages', 'relay', 'package.json'));
          }
          console.log(JSON.stringify(versions));
          NODE
        env:
          PUBLISH_CLI: ${{ inputs.publish_cli }}
          PUBLISH_STACK: ${{ inputs.publish_stack }}
          PUBLISH_RELAY_SERVER: ${{ inputs.publish_relay_server }}

      - name: Run cli tests
        if: inputs.publish_cli && inputs.run_tests
        run: |
          yarn --cwd apps/cli test:unit
          yarn --cwd apps/cli test:integration

      - name: Run stack tests
        if: inputs.publish_stack && inputs.run_tests
        run: |
          yarn --cwd apps/stack test:unit
          yarn --cwd apps/stack test:integration

      - name: Run relay-server tests
        if: inputs.publish_relay_server && inputs.run_tests
        run: yarn --cwd packages/relay test

      - name: Release metadata
        id: meta
        env:
          INPUT_CHANNEL: ${{ inputs.channel }}
          INPUT_PUBLISH_CLI: ${{ inputs.publish_cli }}
          INPUT_PUBLISH_STACK: ${{ inputs.publish_stack }}
          INPUT_PUBLISH_RELAY_SERVER: ${{ inputs.publish_relay_server }}
        run: |
          set -euo pipefail
          sha="$(git rev-parse HEAD)"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "source_ref=${{ steps.resolve_source.outputs.ref }}" >> "$GITHUB_OUTPUT"
          echo "channel=${INPUT_CHANNEL}" >> "$GITHUB_OUTPUT"
          if [ "${INPUT_CHANNEL}" = "preview" ]; then
            echo "npm_tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
          fi
          if [ "${INPUT_PUBLISH_CLI}" = "true" ]; then
            echo "cli_version=$(node -p 'require(\"./apps/cli/package.json\").version')" >> "$GITHUB_OUTPUT"
          else
            echo "cli_version=SKIP" >> "$GITHUB_OUTPUT"
          fi
          if [ "${INPUT_PUBLISH_STACK}" = "true" ]; then
            echo "stack_version=$(node -p 'require(\"./apps/stack/package.json\").version')" >> "$GITHUB_OUTPUT"
          else
            echo "stack_version=SKIP" >> "$GITHUB_OUTPUT"
          fi
          if [ "${INPUT_PUBLISH_RELAY_SERVER}" = "true" ]; then
            echo "relay_server_version=$(node -p 'require(\"./packages/relay/package.json\").version')" >> "$GITHUB_OUTPUT"
          else
            echo "relay_server_version=SKIP" >> "$GITHUB_OUTPUT"
          fi

      - name: Build CLI binaries
        if: inputs.publish_cli
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MINISIGN_PASSPHRASE: ${{ secrets.MINISIGN_PASSPHRASE }}
        run: |
          set -euo pipefail
          node scripts/release/build-cli-binaries.mjs \
            --channel="${{ steps.meta.outputs.channel == 'production' && 'stable' || 'preview' }}" \
            --version="${{ steps.meta.outputs.cli_version }}"

      - name: Generate CLI manifests
        if: inputs.publish_cli
        env:
          ASSETS_BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.channel == 'production' && 'cli-stable' || 'cli-preview' }}
          MANIFEST_CHANNEL: ${{ steps.meta.outputs.channel == 'production' && 'stable' || 'preview' }}
        run: |
          set -euo pipefail
          node scripts/release/publish-manifests.mjs \
            --product=happier \
            --channel="${MANIFEST_CHANNEL}" \
            --version="${{ steps.meta.outputs.cli_version }}" \
            --artifacts-dir="dist/release-assets/cli" \
            --out-dir="dist/release-assets/cli/manifests" \
            --assets-base-url="${ASSETS_BASE_URL}" \
            --commit-sha="${{ steps.meta.outputs.sha }}" \
            --workflow-run-id="${{ github.run_id }}"

      - name: Verify CLI release artifacts
        if: inputs.publish_cli
        env:
          RELEASE_CHANNEL: ${{ steps.meta.outputs.channel == 'production' && 'stable' || 'preview' }}
        run: |
          set -euo pipefail
          version="${{ steps.meta.outputs.cli_version }}"
          test -f "dist/release-assets/cli/checksums-happier-v${version}.txt"
          test -f "dist/release-assets/cli/checksums-happier-v${version}.txt.minisig"
          test -f "dist/release-assets/cli/manifests/v1/happier/${RELEASE_CHANNEL}/latest.json"

      - name: Cryptographic verify CLI release artifacts
        if: inputs.publish_cli
        run: |
          set -euo pipefail
          version="${{ steps.meta.outputs.cli_version }}"
          node scripts/release/verify-artifacts.mjs \
            --artifacts-dir="dist/release-assets/cli" \
            --checksums="dist/release-assets/cli/checksums-happier-v${version}.txt" \
            --public-key="scripts/release/installers/happier-release.pub" \
            --skip-smoke

      - name: npm publish
        if: inputs.publish_cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
            echo "Using NPM_TOKEN authentication."
          else
            echo "NPM_TOKEN not set; relying on npm trusted publishing (OIDC)."
          fi
          cd apps/cli
          yarn prepublishOnly
          npm publish --provenance --access public --tag "${{ steps.meta.outputs.npm_tag }}" || {
            echo "npm publish failed. Configure npm trusted publishing for this workflow or provide NPM_TOKEN." >&2
            exit 1
          }

      - name: npm pack (cli)
        if: inputs.publish_cli
        run: |
          set -euo pipefail
          mkdir -p dist/release-assets/cli
          cd apps/cli
          pack_json="$(npm pack --json)"
          tgz="$(
            PACK_JSON="${pack_json}" node -e '
              const raw = (process.env.PACK_JSON ?? "").trim();
              const parsed = raw ? JSON.parse(raw) : [];
              const entry = Array.isArray(parsed) ? parsed[0] : parsed;
              const filename = typeof entry?.filename === "string" ? entry.filename.trim() : "";
              if (!filename) process.exit(1);
              process.stdout.write(filename);
            '
          )" || {
            echo "npm pack --json did not return a valid filename" >&2
            exit 1
          }
          if [ -z "${tgz:-}" ] || [ ! -f "$tgz" ] || [ "${tgz##*.}" != "tgz" ]; then
            echo "npm pack did not produce an expected .tgz file: '$tgz'" >&2
            exit 1
          fi
          mv "$tgz" "../../dist/release-assets/cli/cli-${{ steps.meta.outputs.cli_version }}.tgz"

      - name: Upload npm pack artifact (cli)
        if: inputs.publish_cli
        uses: actions/upload-artifact@v4
        with:
          name: npm-pack-cli
          path: dist/release-assets/cli
          if-no-files-found: error

      - name: npm publish (stack)
        if: inputs.publish_stack
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
            echo "Using NPM_TOKEN authentication."
          else
            echo "NPM_TOKEN not set; relying on npm trusted publishing (OIDC)."
          fi
          cd apps/stack
          npm publish --provenance --access public --tag "${{ steps.meta.outputs.npm_tag }}" || {
            echo "npm publish failed. Configure npm trusted publishing for this workflow or provide NPM_TOKEN." >&2
            exit 1
          }

      - name: npm publish (relay-server)
        if: inputs.publish_relay_server
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${NODE_AUTH_TOKEN:-}" ]; then
            echo "Using NPM_TOKEN authentication."
          else
            echo "NPM_TOKEN not set; relying on npm trusted publishing (OIDC)."
          fi
          cd packages/relay
          npm publish --provenance --access public --tag "${{ steps.meta.outputs.npm_tag }}" || {
            echo "npm publish failed. Configure npm trusted publishing for this workflow or provide NPM_TOKEN." >&2
            exit 1
          }

      - name: npm pack (stack)
        if: inputs.publish_stack
        run: |
          set -euo pipefail
          mkdir -p dist/release-assets/stack
          cd apps/stack
          pack_json="$(npm pack --json)"
          tgz="$(
            PACK_JSON="${pack_json}" node -e '
              const raw = (process.env.PACK_JSON ?? "").trim();
              const parsed = raw ? JSON.parse(raw) : [];
              const entry = Array.isArray(parsed) ? parsed[0] : parsed;
              const filename = typeof entry?.filename === "string" ? entry.filename.trim() : "";
              if (!filename) process.exit(1);
              process.stdout.write(filename);
            '
          )" || {
            echo "npm pack --json did not return a valid filename" >&2
            exit 1
          }
          if [ -z "${tgz:-}" ] || [ ! -f "$tgz" ] || [ "${tgz##*.}" != "tgz" ]; then
            echo "npm pack did not produce an expected .tgz file: '$tgz'" >&2
            exit 1
          fi
          mv "$tgz" "../../dist/release-assets/stack/stack-${{ steps.meta.outputs.stack_version }}.tgz"

      - name: Build hstack binaries
        if: inputs.publish_stack
        env:
          MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
          MINISIGN_PASSPHRASE: ${{ secrets.MINISIGN_PASSPHRASE }}
        run: |
          set -euo pipefail
          node scripts/release/build-hstack-binaries.mjs \
            --channel="${{ steps.meta.outputs.channel == 'production' && 'stable' || 'preview' }}" \
            --version="${{ steps.meta.outputs.stack_version }}"

      - name: Generate hstack manifests
        if: inputs.publish_stack
        env:
          ASSETS_BASE_URL: https://github.com/${{ github.repository }}/releases/download/${{ steps.meta.outputs.channel == 'production' && 'stack-stable' || 'stack-preview' }}
          MANIFEST_CHANNEL: ${{ steps.meta.outputs.channel == 'production' && 'stable' || 'preview' }}
        run: |
          set -euo pipefail
          node scripts/release/publish-manifests.mjs \
            --product=hstack \
            --channel="${MANIFEST_CHANNEL}" \
            --version="${{ steps.meta.outputs.stack_version }}" \
            --artifacts-dir="dist/release-assets/stack" \
            --out-dir="dist/release-assets/stack/manifests" \
            --assets-base-url="${ASSETS_BASE_URL}" \
            --commit-sha="${{ steps.meta.outputs.sha }}" \
            --workflow-run-id="${{ github.run_id }}"

      - name: Verify hstack release artifacts
        if: inputs.publish_stack
        env:
          RELEASE_CHANNEL: ${{ steps.meta.outputs.channel == 'production' && 'stable' || 'preview' }}
        run: |
          set -euo pipefail
          version="${{ steps.meta.outputs.stack_version }}"
          test -f "dist/release-assets/stack/checksums-hstack-v${version}.txt"
          test -f "dist/release-assets/stack/checksums-hstack-v${version}.txt.minisig"
          test -f "dist/release-assets/stack/manifests/v1/hstack/${RELEASE_CHANNEL}/latest.json"

      - name: Cryptographic verify hstack release artifacts
        if: inputs.publish_stack
        run: |
          set -euo pipefail
          version="${{ steps.meta.outputs.stack_version }}"
          node scripts/release/verify-artifacts.mjs \
            --artifacts-dir="dist/release-assets/stack" \
            --checksums="dist/release-assets/stack/checksums-hstack-v${version}.txt" \
            --public-key="scripts/release/installers/happier-release.pub" \
            --skip-smoke

      - name: Upload npm pack artifact (stack)
        if: inputs.publish_stack
        uses: actions/upload-artifact@v4
        with:
          name: npm-pack-stack
          path: dist/release-assets/stack
          if-no-files-found: error

      - name: Step summary
        if: always()
        env:
          INPUT_CHANNEL: ${{ inputs.channel }}
          INPUT_PUBLISH_CLI: ${{ inputs.publish_cli }}
          INPUT_PUBLISH_STACK: ${{ inputs.publish_stack }}
          INPUT_PUBLISH_RELAY_SERVER: ${{ inputs.publish_relay_server }}
        run: |
          npm_tag="${{ steps.meta.outputs.npm_tag }}"
          cli_version="${{ steps.meta.outputs.cli_version }}"
          stack_version="${{ steps.meta.outputs.stack_version }}"
          relay_server_version="${{ steps.meta.outputs.relay_server_version }}"
          [ -n "${npm_tag}" ] || npm_tag="(unavailable)"
          [ -n "${cli_version}" ] || cli_version="(unavailable)"
          [ -n "${stack_version}" ] || stack_version="(unavailable)"
          [ -n "${relay_server_version}" ] || relay_server_version="(unavailable)"

          {
            echo "### npm publish"
            echo ""
            echo "- source ref: \`${{ steps.meta.outputs.source_ref }}\`"
            echo "- channel: \`${INPUT_CHANNEL}\`"
            echo "- npm dist-tag: \`${npm_tag}\`"
            if [ "${INPUT_PUBLISH_CLI}" = "true" ]; then
              echo "- cli: \`${cli_version}\`"
            fi
          if [ "${INPUT_PUBLISH_STACK}" = "true" ]; then
            echo "- stack: \`${stack_version}\`"
          fi
              if [ "${INPUT_PUBLISH_RELAY_SERVER}" = "true" ]; then
                echo "- relay-server: \`${relay_server_version}\`"
              fi
            echo ""
            echo "### GitHub Releases (mirror)"
            echo ""
            if [ "${INPUT_CHANNEL}" = "preview" ]; then
              if [ "${INPUT_PUBLISH_CLI}" = "true" ]; then echo "- \`cli-preview\` (rolling prerelease)"; fi
              if [ "${INPUT_PUBLISH_STACK}" = "true" ]; then echo "- \`stack-preview\` (rolling prerelease)"; fi
            else
              if [ "${INPUT_PUBLISH_CLI}" = "true" ]; then echo "- \`cli-v${cli_version}\`"; fi
              if [ "${INPUT_PUBLISH_STACK}" = "true" ]; then echo "- \`stack-v${stack_version}\`"; fi
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  mirror-cli-stable:
    if: ${{ needs.release.outputs.channel == 'production' && needs.release.outputs.cli_version != 'SKIP' }}
    needs: release
    uses: ./.github/workflows/publish-github-release.yml
    secrets: inherit
    with:
      tag: cli-v${{ needs.release.outputs.cli_version }}
      title: CLI v${{ needs.release.outputs.cli_version }}
      target_sha: ${{ needs.release.outputs.sha }}
      prerelease: false
      rolling_tag: false
      generate_notes: true
      clobber: true
      assets_artifact: npm-pack-cli
      assets_artifact_path: dist/release-assets/cli
      assets_dir: dist/release-assets/cli

  mirror-cli-stable-rolling:
    if: ${{ needs.release.outputs.channel == 'production' && needs.release.outputs.cli_version != 'SKIP' }}
    needs: release
    uses: ./.github/workflows/publish-github-release.yml
    secrets: inherit
    with:
      tag: cli-stable
      title: CLI Stable
      target_sha: ${{ needs.release.outputs.sha }}
      prerelease: false
      rolling_tag: true
      generate_notes: false
      notes: "Rolling stable build (npm dist-tag: latest)."
      clobber: true
      assets_artifact: npm-pack-cli
      assets_artifact_path: dist/release-assets/cli
      assets_dir: dist/release-assets/cli

  mirror-cli-preview:
    if: ${{ needs.release.outputs.channel == 'preview' && needs.release.outputs.cli_version != 'SKIP' }}
    needs: release
    uses: ./.github/workflows/publish-github-release.yml
    secrets: inherit
    with:
      tag: cli-preview
      title: CLI Preview
      target_sha: ${{ needs.release.outputs.sha }}
      prerelease: true
      rolling_tag: true
      generate_notes: false
      notes: "Rolling preview build (npm dist-tag: next)."
      clobber: true
      assets_artifact: npm-pack-cli
      assets_artifact_path: dist/release-assets/cli
      assets_dir: dist/release-assets/cli

  mirror-stack-stable:
    if: ${{ needs.release.outputs.channel == 'production' && needs.release.outputs.stack_version != 'SKIP' }}
    needs: release
    uses: ./.github/workflows/publish-github-release.yml
    secrets: inherit
    with:
      tag: stack-v${{ needs.release.outputs.stack_version }}
      title: Stack v${{ needs.release.outputs.stack_version }}
      target_sha: ${{ needs.release.outputs.sha }}
      prerelease: false
      rolling_tag: false
      generate_notes: true
      clobber: true
      assets_artifact: npm-pack-stack
      assets_artifact_path: dist/release-assets/stack
      assets_dir: dist/release-assets/stack

  mirror-stack-stable-rolling:
    if: ${{ needs.release.outputs.channel == 'production' && needs.release.outputs.stack_version != 'SKIP' }}
    needs: release
    uses: ./.github/workflows/publish-github-release.yml
    secrets: inherit
    with:
      tag: stack-stable
      title: Stack Stable
      target_sha: ${{ needs.release.outputs.sha }}
      prerelease: false
      rolling_tag: true
      generate_notes: false
      notes: "Rolling stable build (npm dist-tag: latest)."
      clobber: true
      assets_artifact: npm-pack-stack
      assets_artifact_path: dist/release-assets/stack
      assets_dir: dist/release-assets/stack

  mirror-stack-preview:
    if: ${{ needs.release.outputs.channel == 'preview' && needs.release.outputs.stack_version != 'SKIP' }}
    needs: release
    uses: ./.github/workflows/publish-github-release.yml
    secrets: inherit
    with:
      tag: stack-preview
      title: Stack Preview
      target_sha: ${{ needs.release.outputs.sha }}
      prerelease: true
      rolling_tag: true
      generate_notes: false
