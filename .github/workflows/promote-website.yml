name: PROMOTE — Website (deploy branch)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target — Environment (deploy branch)"
        required: true
        type: choice
        options:
          - preview
          - production
      force_deploy:
        description: "Deploy — Force deploy webhook trigger even if deploy branch is already up to date"
        required: true
        default: false
        type: boolean
      run_build:
        description: "Checks — Run apps/website build before promoting"
        required: true
        default: true
        type: boolean
      source_ref:
        description: "Promotion — Source ref to promote (branch, tag, or SHA). Use 'auto' to default preview→dev, production→main."
        required: true
        default: auto
        type: string
      allow_cross_promote:
        description: "Safety — Allow promoting a non-default source ref to the selected environment (use with care)."
        required: true
        default: false
        type: boolean
      bump:
        description: "Versions — Version bump on source ref (website)"
        required: true
        type: choice
        default: none
        options:
          - none
          - patch
          - minor
          - major
  workflow_call:
    inputs:
      environment:
        description: "Target — Environment (deploy branch)"
        required: true
        type: string
      force_deploy:
        description: "Deploy — Force deploy webhook trigger even if deploy branch is already up to date"
        required: false
        default: false
        type: boolean
      run_build:
        description: "Checks — Run apps/website build before promoting"
        required: false
        default: true
        type: boolean
      source_ref:
        description: "Promotion — Source ref to promote (branch, tag, or SHA). Use 'auto' to default preview→dev, production→main."
        required: false
        default: auto
        type: string
      allow_cross_promote:
        description: "Safety — Allow promoting a non-default source ref to the selected environment (use with care)."
        required: false
        default: false
        type: boolean
      bump:
        description: "Versions — Version bump on source ref (website)"
        required: false
        default: none
        type: string

permissions:
  contents: read

concurrency:
  group: promote-website-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release_actor_guard:
    name: Release actor guard
    permissions:
      contents: read
      members: read
    uses: ./.github/workflows/release-actor-guard.yml

  promote:
    needs: [release_actor_guard]
    runs-on: ubuntu-latest
    environment: release-shared
    steps:
      - name: Resolve source ref
        id: resolve
        run: |
          set -euo pipefail
          env_name="${{ inputs.environment }}"
          src="${{ inputs.source_ref }}"
          if [ "$src" = "auto" ]; then
            if [ "$env_name" = "preview" ]; then
              src="dev"
            else
              src="main"
            fi
          fi

          # Guardrails: allow using non-default source ref only when explicitly confirmed.
          if [ "$env_name" = "production" ] && [ "$src" != "main" ] && [ "${{ inputs.allow_cross_promote }}" != "true" ]; then
            echo "Refusing to promote '$src' to production without allow_cross_promote=true." >&2
            exit 1
          fi

          # Bumps require a real branch target we can push back to.
          if [ "${{ inputs.bump }}" != "none" ] && [ "$src" != "main" ] && [ "$src" != "dev" ]; then
            echo "Refusing to bump versions when source_ref is not a branch (main/dev). Set bump=none or use a branch." >&2
            exit 1
          fi

          echo "ref=$src" >> "$GITHUB_OUTPUT"

      - name: Enforce trusted refs for manual dispatch
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]; then
            exit 0
          fi
          case "${GITHUB_REF_NAME}" in
            dev|main) ;;
            *)
              echo "Refusing workflow_dispatch from untrusted ref '${GITHUB_REF_NAME}'. Use dev or main." >&2
              exit 1
              ;;
          esac

      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Checkout source ref
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.ref }}
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Enable Corepack (Yarn)
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Install dependencies
        env:
          YARN_PRODUCTION: "false"
          npm_config_production: "false"
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Sync installer assets into website public
        id: sync_installers
        run: |
          set -euo pipefail
          node scripts/release/sync-installers.mjs
          if git diff --quiet -- \
            apps/website/public/install.sh \
            apps/website/public/self-host.sh \
            apps/website/public/install.ps1 \
            apps/website/public/happier-release.pub; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump website version (source ref)
        id: bump_website
        run: |
          set -euo pipefail
          out="$(node scripts/release/bump-version.mjs --component website --bump "${{ inputs.bump }}")"
          if [ "$out" = "SKIP" ]; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skipped=false" >> "$GITHUB_OUTPUT"
          echo "version=$out" >> "$GITHUB_OUTPUT"

      - name: Build website
        if: inputs.run_build
        run: |
          set -euo pipefail
          yarn workspace @happier-dev/website build

      - name: Commit website release updates (source ref)
        id: commit_changes
        if: steps.bump_website.outputs.skipped != 'true' || steps.sync_installers.outputs.changed == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            apps/website/package.json \
            apps/website/public/install.sh \
            apps/website/public/self-host.sh \
            apps/website/public/install.ps1 \
            apps/website/public/happier-release.pub

          if git diff --cached --quiet; then
            echo "did_commit=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ steps.bump_website.outputs.skipped }}" != "true" ]; then
            message="chore(release): bump website to v${{ steps.bump_website.outputs.version }}"
            if [ "${{ steps.sync_installers.outputs.changed }}" = "true" ]; then
              message="${message} and sync installers"
            fi
          else
            message="chore(release): sync website installers from release sources"
          fi

          git commit -m "${message}"
          echo "did_commit=true" >> "$GITHUB_OUTPUT"

      - name: Detect whether source ref is a branch
        id: source_ref_kind
        run: |
          set -euo pipefail
          src="${{ steps.resolve.outputs.ref }}"
          if git ls-remote --exit-code --heads origin "${src}" >/dev/null 2>&1; then
            echo "is_branch=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_branch=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push source ref (only for branches)
        if: steps.commit_changes.outputs.did_commit == 'true' && steps.source_ref_kind.outputs.is_branch == 'true'
        run: |
          set -euo pipefail
          src="${{ steps.resolve.outputs.ref }}"
          git push origin "HEAD:refs/heads/$src"

      - name: Promote source ref to deploy branch
        env:
          DEPLOY_REF: deploy/${{ inputs.environment }}/website
        run: |
          set -euo pipefail
          remote_sha="$(git ls-remote --heads origin "$DEPLOY_REF" | awk '{print $1}')"
          if [ -n "$remote_sha" ]; then
            git push origin HEAD:"$DEPLOY_REF" --force-with-lease="refs/heads/$DEPLOY_REF:$remote_sha"
          else
            git push origin HEAD:"$DEPLOY_REF"
          fi

  deploy_dispatch:
    if: needs.promote.result == 'success'
    needs: [promote]
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    with:
      environment: ${{ inputs.environment }}
      component: website
      confirm: deploy ${{ inputs.environment }} website
