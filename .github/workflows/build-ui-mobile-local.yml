name: BUILD — UI Mobile (local runner)

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Git ref (branch, tag, or SHA) to build"
        required: false
        default: ""
        type: string
      environment:
        description: "App variant (maps to APP_ENV)"
        required: true
        type: choice
        default: preview
        options:
          - preview
          - production
      platform:
        description: "Native platform to build"
        required: true
        type: choice
        default: all
        options:
          - ios
          - android
          - all
      profile:
        description: "EAS build profile (auto: preview→preview, production→production)"
        required: true
        type: choice
        default: auto
        options:
          - auto
          - preview
          - preview-apk
          - production
          - production-apk
      action:
        description: "Whether to submit the built binaries to stores"
        required: true
        type: choice
        default: build_only
        options:
          - build_only
          - build_and_submit
  workflow_call:
    inputs:
      source_ref:
        required: false
        default: ""
        type: string
      environment:
        required: true
        type: string
      platform:
        required: false
        default: all
        type: string
      profile:
        required: false
        default: auto
        type: string
      action:
        required: false
        default: build_only
        type: string
    secrets:
      EXPO_TOKEN:
        required: true

permissions:
  contents: read

concurrency:
  group: build-ui-mobile-local-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release_actor_guard:
    name: Release actor guard
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Authorize release actor
        uses: ./.github/actions/release-actor-guard
        with:
          team_slug: release-admins
          app_id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private_key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

  build_android:
    name: Build (android)
    if: ${{ inputs.platform == 'all' || inputs.platform == 'android' }}
    needs: [release_actor_guard]
    runs-on: ubuntu-latest
    environment: release-shared
    env:
      EAS_CLI_VERSION: 18.0.1
      APP_ENV: ${{ inputs.environment }}
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EAS_PLATFORM: android
      # Local Android release builds can exceed default heap limits during D8 dex merging.
      # Raise heap and reduce concurrent workers for reliability on GitHub-hosted runners.
      JAVA_TOOL_OPTIONS: -Xmx6g -Dfile.encoding=UTF-8
      GRADLE_OPTS: -Xmx6g -Dfile.encoding=UTF-8 -Dorg.gradle.workers.max=2 -Dkotlin.daemon.jvm.options=-Xmx2g
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref != '' && inputs.source_ref || github.sha }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Enable Corepack (Yarn)
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Install dependencies
        env:
          YARN_PRODUCTION: "false"
          npm_config_production: "false"
          # Keep builds mobile-focused (desktop/web builds happen elsewhere).
          HAPPIER_INSTALL_SCOPE: "ui,protocol,agents"
          HAPPIER_UI_VENDOR_WEB_ASSETS: "0"
          HAPPIER_EMBEDDED_POLICY_ENV: ${{ inputs.environment == 'production' && 'production' || 'preview' }}
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Resolve EAS build profile + output path
        id: meta
        run: |
          set -euo pipefail

          if [ -z "${EXPO_TOKEN:-}" ]; then
            echo "EXPO_TOKEN is required to run EAS local builds (credentials are fetched from EAS)." >&2
            exit 1
          fi

          env_name="${{ inputs.environment }}"
          platform="${EAS_PLATFORM}"
          profile="${{ inputs.profile }}"
          if [ "${profile}" = "auto" ]; then
            profile="${env_name}"
          fi

          app_version="$(node -p 'require("./apps/ui/package.json").version' | tr -d '\n')"
          if [ -z "${app_version:-}" ]; then
            echo "Unable to resolve apps/ui version." >&2
            exit 1
          fi

          ext=""
          if [ "${platform}" = "android" ]; then
            if printf '%s' "${profile}" | grep -q -- '-apk$'; then
              ext="apk"
            else
              ext="aab"
            fi
          else
            ext="ipa"
          fi

          mkdir -p dist/ui-mobile
          out=""
          if [ "${env_name}" = "production" ]; then
            out="dist/ui-mobile/happier-production-${platform}-v${app_version}.${ext}"
          else
            out="dist/ui-mobile/happier-preview-${platform}.${ext}"
          fi

          echo "profile=${profile}" >> "$GITHUB_OUTPUT"
          echo "app_version=${app_version}" >> "$GITHUB_OUTPUT"
          echo "out=${out}" >> "$GITHUB_OUTPUT"

          {
            echo "### UI Mobile local build"
            echo "- platform: \`${platform}\`"
            echo "- environment: \`${env_name}\`"
            echo "- profile: \`${profile}\`"
            echo "- output: \`${out}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: EAS build (local runner)
        env:
          EAS_BUILD_PROFILE: ${{ steps.meta.outputs.profile }}
          EAS_BUILD_OUT: ${{ steps.meta.outputs.out }}
        run: |
          set -euo pipefail
          cd apps/ui
          abs_out="${GITHUB_WORKSPACE}/${EAS_BUILD_OUT}"
          mkdir -p "$(dirname "${abs_out}")"
          npx --yes "eas-cli@${EAS_CLI_VERSION}" build \
            --platform "${EAS_PLATFORM}" \
            --profile "${EAS_BUILD_PROFILE}" \
            --local \
            --output "${abs_out}" \
            --non-interactive

      - name: Verify build artifact
        env:
          EAS_BUILD_OUT: ${{ steps.meta.outputs.out }}
        run: |
          set -euo pipefail
          if [ ! -f "${EAS_BUILD_OUT}" ]; then
            echo "Missing build output at: ${EAS_BUILD_OUT}" >&2
            exit 1
          fi
          size_bytes="$(wc -c < "${EAS_BUILD_OUT}" | tr -d '[:space:]')"
          if [ "${size_bytes}" -lt 1000000 ]; then
            echo "Build artifact is unexpectedly small (${size_bytes} bytes): ${EAS_BUILD_OUT}" >&2
            exit 1
          fi

      - name: Upload mobile build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-mobile-${{ inputs.environment }}-android
          path: dist/ui-mobile/**
          retention-days: 7

  build_ios:
    name: Build (ios)
    if: ${{ inputs.platform == 'all' || inputs.platform == 'ios' }}
    needs: [release_actor_guard]
    runs-on: macos-latest
    environment: release-shared
    env:
      EAS_CLI_VERSION: 18.0.1
      APP_ENV: ${{ inputs.environment }}
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EAS_PLATFORM: ios
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref != '' && inputs.source_ref || github.sha }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Enable Corepack (Yarn)
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Install dependencies
        env:
          YARN_PRODUCTION: "false"
          npm_config_production: "false"
          # Keep builds mobile-focused (desktop/web builds happen elsewhere).
          HAPPIER_INSTALL_SCOPE: "ui,protocol,agents"
          HAPPIER_UI_VENDOR_WEB_ASSETS: "0"
          HAPPIER_EMBEDDED_POLICY_ENV: ${{ inputs.environment == 'production' && 'production' || 'preview' }}
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Resolve EAS build profile + output path
        id: meta
        run: |
          set -euo pipefail

          if [ -z "${EXPO_TOKEN:-}" ]; then
            echo "EXPO_TOKEN is required to run EAS local builds (credentials are fetched from EAS)." >&2
            exit 1
          fi

          env_name="${{ inputs.environment }}"
          platform="${EAS_PLATFORM}"
          profile="${{ inputs.profile }}"
          if [ "${profile}" = "auto" ]; then
            profile="${env_name}"
          fi

          app_version="$(node -p 'require("./apps/ui/package.json").version' | tr -d '\n')"
          if [ -z "${app_version:-}" ]; then
            echo "Unable to resolve apps/ui version." >&2
            exit 1
          fi

          mkdir -p dist/ui-mobile
          out=""
          if [ "${env_name}" = "production" ]; then
            out="dist/ui-mobile/happier-production-${platform}-v${app_version}.ipa"
          else
            out="dist/ui-mobile/happier-preview-${platform}.ipa"
          fi

          echo "profile=${profile}" >> "$GITHUB_OUTPUT"
          echo "app_version=${app_version}" >> "$GITHUB_OUTPUT"
          echo "out=${out}" >> "$GITHUB_OUTPUT"

          {
            echo "### UI Mobile local build"
            echo "- platform: \`${platform}\`"
            echo "- environment: \`${env_name}\`"
            echo "- profile: \`${profile}\`"
            echo "- output: \`${out}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: EAS build (local runner)
        env:
          EAS_BUILD_PROFILE: ${{ steps.meta.outputs.profile }}
          EAS_BUILD_OUT: ${{ steps.meta.outputs.out }}
        run: |
          set -euo pipefail
          cd apps/ui
          abs_out="${GITHUB_WORKSPACE}/${EAS_BUILD_OUT}"
          mkdir -p "$(dirname "${abs_out}")"
          npx --yes "eas-cli@${EAS_CLI_VERSION}" build \
            --platform "${EAS_PLATFORM}" \
            --profile "${EAS_BUILD_PROFILE}" \
            --local \
            --output "${abs_out}" \
            --non-interactive

      - name: Verify build artifact
        env:
          EAS_BUILD_OUT: ${{ steps.meta.outputs.out }}
        run: |
          set -euo pipefail
          if [ ! -f "${EAS_BUILD_OUT}" ]; then
            echo "Missing build output at: ${EAS_BUILD_OUT}" >&2
            exit 1
          fi
          size_bytes="$(wc -c < "${EAS_BUILD_OUT}" | tr -d '[:space:]')"
          if [ "${size_bytes}" -lt 1000000 ]; then
            echo "Build artifact is unexpectedly small (${size_bytes} bytes): ${EAS_BUILD_OUT}" >&2
            exit 1
          fi

      - name: Upload mobile build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-mobile-${{ inputs.environment }}-ios
          path: dist/ui-mobile/**
          retention-days: 7

  submit_android:
    name: Submit (android)
    if: ${{ inputs.action == 'build_and_submit' && (inputs.platform == 'all' || inputs.platform == 'android') }}
    needs: [release_actor_guard, build_android]
    runs-on: ubuntu-latest
    environment: release-shared
    env:
      EAS_CLI_VERSION: 18.0.1
      APP_ENV: ${{ inputs.environment }}
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EAS_PLATFORM: android
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref != '' && inputs.source_ref || github.sha }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Resolve expected build output path
        id: meta
        run: |
          set -euo pipefail
          env_name="${{ inputs.environment }}"
          platform="${EAS_PLATFORM}"
          profile="${{ inputs.profile }}"
          if [ "${profile}" = "auto" ]; then
            profile="${env_name}"
          fi

          app_version="$(node -p 'require("./apps/ui/package.json").version' | tr -d '\n')"
          if [ -z "${app_version:-}" ]; then
            echo "Unable to resolve apps/ui version." >&2
            exit 1
          fi

          ext="aab"
          if printf '%s' "${profile}" | grep -q -- '-apk$'; then
            ext="apk"
          fi

          out=""
          if [ "${env_name}" = "production" ]; then
            out="dist/ui-mobile/happier-production-${platform}-v${app_version}.${ext}"
          else
            out="dist/ui-mobile/happier-preview-${platform}.${ext}"
          fi

          echo "out=${out}" >> "$GITHUB_OUTPUT"

      - name: Download mobile build artifact
        uses: actions/download-artifact@v4
        with:
          name: ui-mobile-${{ inputs.environment }}-android
          path: .

      - name: Resolve downloaded build artifact path
        id: artifact
        env:
          EAS_BUILD_OUT: ${{ steps.meta.outputs.out }}
        run: |
          set -euo pipefail

          rel="${EAS_BUILD_OUT}"
          artifact_dir="ui-mobile-${{ inputs.environment }}-android"

          candidates=(
            "${GITHUB_WORKSPACE}/${rel}"
            "${GITHUB_WORKSPACE}/${artifact_dir}/${rel}"
          )

          for candidate in "${candidates[@]}"; do
            if [ -f "${candidate}" ]; then
              echo "path=${candidate}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          base="$(basename "${rel}")"
          found="$(find "${GITHUB_WORKSPACE}" -maxdepth 6 -type f -path '*/dist/ui-mobile/*' -name "${base}" -print -quit || true)"
          if [ -n "${found:-}" ] && [ -f "${found}" ]; then
            echo "path=${found}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Unable to find downloaded build output for submit." >&2
          echo "Expected (relative): ${rel}" >&2
          echo "Searched (candidates):" >&2
          printf ' - %s\n' "${candidates[@]}" >&2
          echo "Found files under dist/ui-mobile:" >&2
          find "${GITHUB_WORKSPACE}" -maxdepth 6 -type f -path '*/dist/ui-mobile/*' -print >&2 || true
          exit 1

      - name: EAS submit (local binary)
        env:
          SUBMIT_PATH: ${{ steps.artifact.outputs.path }}
        run: |
          set -euo pipefail
          if [ -z "${EXPO_TOKEN:-}" ]; then
            echo "EXPO_TOKEN is required for EAS submit." >&2
            exit 1
          fi
          cd apps/ui
          if ! npx --yes "eas-cli@${EAS_CLI_VERSION}" submit \
            --platform "${EAS_PLATFORM}" \
            --path "${SUBMIT_PATH}" \
            --profile production \
            --non-interactive; then
            if [ "${{ inputs.environment }}" = "preview" ]; then
              echo "::warning::EAS submit failed for preview; continuing so the successful local build artifact is preserved."
              exit 0
            fi
            echo "EAS submit failed for production." >&2
            exit 1
          fi

  submit_ios:
    name: Submit (ios)
    if: ${{ inputs.action == 'build_and_submit' && (inputs.platform == 'all' || inputs.platform == 'ios') }}
    needs: [release_actor_guard, build_ios]
    runs-on: macos-latest
    environment: release-shared
    env:
      EAS_CLI_VERSION: 18.0.1
      APP_ENV: ${{ inputs.environment }}
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EAS_PLATFORM: ios
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref != '' && inputs.source_ref || github.sha }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Resolve expected build output path
        id: meta
        run: |
          set -euo pipefail
          env_name="${{ inputs.environment }}"
          platform="${EAS_PLATFORM}"

          app_version="$(node -p 'require("./apps/ui/package.json").version' | tr -d '\n')"
          if [ -z "${app_version:-}" ]; then
            echo "Unable to resolve apps/ui version." >&2
            exit 1
          fi

          out=""
          if [ "${env_name}" = "production" ]; then
            out="dist/ui-mobile/happier-production-${platform}-v${app_version}.ipa"
          else
            out="dist/ui-mobile/happier-preview-${platform}.ipa"
          fi

          echo "out=${out}" >> "$GITHUB_OUTPUT"

      - name: Download mobile build artifact
        uses: actions/download-artifact@v4
        with:
          name: ui-mobile-${{ inputs.environment }}-ios
          path: .

      - name: Resolve downloaded build artifact path
        id: artifact
        env:
          EAS_BUILD_OUT: ${{ steps.meta.outputs.out }}
        run: |
          set -euo pipefail

          rel="${EAS_BUILD_OUT}"
          artifact_dir="ui-mobile-${{ inputs.environment }}-ios"

          candidates=(
            "${GITHUB_WORKSPACE}/${rel}"
            "${GITHUB_WORKSPACE}/${artifact_dir}/${rel}"
          )

          for candidate in "${candidates[@]}"; do
            if [ -f "${candidate}" ]; then
              echo "path=${candidate}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          base="$(basename "${rel}")"
          found="$(find "${GITHUB_WORKSPACE}" -maxdepth 6 -type f -path '*/dist/ui-mobile/*' -name "${base}" -print -quit || true)"
          if [ -n "${found:-}" ] && [ -f "${found}" ]; then
            echo "path=${found}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Unable to find downloaded build output for submit." >&2
          echo "Expected (relative): ${rel}" >&2
          echo "Searched (candidates):" >&2
          printf ' - %s\n' "${candidates[@]}" >&2
          echo "Found files under dist/ui-mobile:" >&2
          find "${GITHUB_WORKSPACE}" -maxdepth 6 -type f -path '*/dist/ui-mobile/*' -print >&2 || true
          exit 1

      - name: EAS submit (local binary)
        env:
          SUBMIT_PATH: ${{ steps.artifact.outputs.path }}
        run: |
          set -euo pipefail
          if [ -z "${EXPO_TOKEN:-}" ]; then
            echo "EXPO_TOKEN is required for EAS submit." >&2
            exit 1
          fi
          cd apps/ui
          if ! npx --yes "eas-cli@${EAS_CLI_VERSION}" submit \
            --platform "${EAS_PLATFORM}" \
            --path "${SUBMIT_PATH}" \
            --profile production \
            --non-interactive; then
            if [ "${{ inputs.environment }}" = "preview" ]; then
              echo "::warning::EAS submit failed for preview; continuing so the successful local build artifact is preserved."
              exit 0
            fi
            echo "EAS submit failed for production." >&2
            exit 1
          fi
