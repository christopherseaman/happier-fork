name: GUARD — Release Actor Authorization

on:
  workflow_call:
    inputs:
      team_slug:
        description: Team slug allowed to run release/deploy/provider workflows
        required: false
        type: string
        default: release-admins
      org:
        description: GitHub organization that owns the team
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  authorize:
    runs-on: ubuntu-latest
    steps:
      - name: Verify triggering actor is in release admin team
        env:
          INPUT_ORG: ${{ inputs.org }}
          INPUT_TEAM_SLUG: ${{ inputs.team_slug }}
          REPO_OWNER: ${{ github.repository_owner }}
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_ADMIN_ACTORS: ${{ vars.RELEASE_ADMIN_ACTORS }}
        run: |
          set -euo pipefail

          actor="${GITHUB_TRIGGERING_ACTOR:-${GITHUB_ACTOR:-}}"
          if [ -z "${actor}" ]; then
            echo "Unable to resolve triggering actor." >&2
            exit 1
          fi

          team_slug="${INPUT_TEAM_SLUG:-release-admins}"
          org="${INPUT_ORG:-$REPO_OWNER}"
          if [ -z "${org}" ]; then
            echo "Unable to resolve organization owner." >&2
            exit 1
          fi

          echo "Authorizing actor '${actor}' against team '${org}/${team_slug}'."

          if gh api --silent \
            --header "Accept: application/vnd.github+json" \
            "orgs/${org}/teams/${team_slug}/memberships/${actor}" >/dev/null 2>&1; then
            echo "Actor '${actor}' is a member of '${org}/${team_slug}'."
            exit 0
          fi

          fallback="${RELEASE_ADMIN_ACTORS:-leeroybrun}"
          normalized="$(printf '%s' "${fallback}" | tr '[:upper:]' '[:lower:]' | tr -d ' \t\r\n')"
          actor_lc="$(printf '%s' "${actor}" | tr '[:upper:]' '[:lower:]')"

          if [ -n "${normalized}" ]; then
            IFS=',' read -r -a candidates <<< "${normalized}"
            for candidate in "${candidates[@]}"; do
              [ -z "${candidate:-}" ] && continue
              if [ "${candidate}" = "${actor_lc}" ]; then
                echo "::warning::Team API check was unavailable; actor '${actor}' authorized via RELEASE_ADMIN_ACTORS fallback."
                exit 0
              fi
            done
          fi

          echo "Actor '${actor}' is not authorized for release workflows." >&2
          echo "Set repository variable RELEASE_ADMIN_ACTORS (comma-separated logins) or restore team API accessibility." >&2
          exit 1
