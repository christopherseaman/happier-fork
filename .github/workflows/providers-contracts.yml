name: CI — Provider Contracts

on:
  workflow_dispatch:
    inputs:
      preset:
        description: "Preset"
        required: true
        default: all
        type: choice
        options:
          - all
          - claude
          - codex
          - opencode
      tier:
        description: "Tier"
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - extended
      strict_keys:
        description: "Fail on new fixture keys"
        required: true
        default: false
        type: boolean
      flake_retry:
        description: "Retry once to classify flakes"
        required: true
        default: true
        type: boolean
      model_default:
        description: "Optional default model override for all providers"
        required: true
        default: ""
        type: string
      model_overrides:
        description: "Optional provider-specific model overrides (comma/newline list: provider=model)"
        required: true
        default: ""
        type: string
  workflow_call:
    inputs:
      preset:
        description: "Preset"
        required: true
        type: string
      tier:
        description: "Tier"
        required: true
        type: string
      strict_keys:
        description: "Fail on new fixture keys"
        required: true
        type: boolean
      flake_retry:
        description: "Retry once to classify flakes"
        required: true
        type: boolean
      model_default:
        description: "Optional default model override for all providers"
        required: false
        default: ""
        type: string
      model_overrides:
        description: "Optional provider-specific model overrides (comma/newline list: provider=model)"
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release_actor_guard:
    name: Release actor guard
    permissions:
      contents: read
    uses: ./.github/workflows/release-actor-guard.yml

  trusted_ref_guard:
    needs: [release_actor_guard]
    runs-on: ubuntu-latest
    steps:
      - name: Enforce trusted refs for manual dispatch
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]; then
            exit 0
          fi
          case "${GITHUB_REF_NAME}" in
            dev|main) ;;
            *)
              echo "Refusing workflow_dispatch from untrusted ref '${GITHUB_REF_NAME}'. Use dev or main." >&2
              exit 1
              ;;
          esac

  providers:
    needs: [trusted_ref_guard]
    uses: ./.github/workflows/tests.yml
    secrets: inherit
    with:
      run_ui: false
      run_server: false
      run_cli: false
      run_stack: false
      run_typecheck: false
      run_cli_daemon_e2e: false
      run_e2e_core: false
      run_providers: true
      providers_preset: ${{ inputs.preset }}
      providers_tier: ${{ inputs.tier }}
      providers_strict_keys: ${{ inputs.strict_keys }}
      providers_flake_retry: ${{ inputs.flake_retry }}
      providers_model_default: ${{ inputs.model_default }}
      providers_model_overrides: ${{ inputs.model_overrides }}
      providers_update_baselines: false
      run_stress: false
      stress_repeat: "5"
      stress_seed: ""
