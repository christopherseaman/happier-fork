name: BUILD — Desktop (Tauri)

defaults:
  run:
    shell: bash

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment — Controls config (preview|production)"
        required: true
        type: choice
        default: preview
        options:
          - preview
          - production
      source_ref:
        description: "Source ref — Branch, tag, or SHA to build"
        required: true
        default: dev
        type: string
      publish_release:
        description: "Release — Upload bundles + updater feed to GitHub Releases"
        required: true
        default: true
        type: boolean
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      source_ref:
        required: true
        type: string
      publish_release:
        required: false
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: build-tauri-${{ github.ref }}-${{ inputs.environment }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22.x"
  UI_REPO: ${{ github.repository }}

jobs:
  release_actor_guard:
    name: Release actor guard
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Authorize release actor
        uses: ./.github/actions/release-actor-guard
        with:
          team_slug: release-admins

  resolve_source:
    name: Resolve source ref to SHA
    runs-on: ubuntu-latest
    needs: [release_actor_guard]
    outputs:
      source_sha: ${{ steps.resolve.outputs.source_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}
          fetch-depth: 1

      - name: Resolve source SHA
        id: resolve
        run: |
          set -euo pipefail
          source_sha="$(git rev-parse HEAD)"
          if [ -z "${source_sha:-}" ]; then
            echo "Unable to resolve source SHA from ref '${{ inputs.source_ref }}'" >&2
            exit 1
          fi
          echo "source_sha=${source_sha}" >> "$GITHUB_OUTPUT"

  build:
    name: Build updater artifacts (${{ matrix.platform_key }})
    runs-on: ${{ matrix.os }}
    needs: [resolve_source]
    environment: release-shared
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform_key: linux-x86_64
            tauri_target: ""
          - os: windows-latest
            platform_key: windows-x86_64
            tauri_target: ""
          - os: macos-latest
            platform_key: darwin-aarch64
            tauri_target: aarch64-apple-darwin
          - os: macos-latest
            platform_key: darwin-x86_64
            tauri_target: x86_64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve_source.outputs.source_sha }}
          fetch-depth: 1

      - name: Enforce trusted refs for manual dispatch
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]; then
            exit 0
          fi
          case "${GITHUB_REF_NAME}" in
            dev|main) ;;
            *)
              echo "Refusing workflow_dispatch from untrusted ref '${GITHUB_REF_NAME}'. Use dev or main." >&2
              exit 1
              ;;
          esac

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Validate updater public key (production)
        if: inputs.environment == 'production'
        run: |
          set -euo pipefail
          node - <<'NODE'
          const fs = require('node:fs');
          const conf = JSON.parse(fs.readFileSync('apps/ui/src-tauri/tauri.conf.json', 'utf8'));
          const pubkey = conf?.plugins?.updater?.pubkey;
          const placeholder = 'REPLACE_WITH_TAURI_UPDATER_PUBLIC_KEY_PEM';
          if (typeof pubkey !== 'string' || pubkey.trim().length === 0 || pubkey.includes(placeholder)) {
            console.error(`Invalid Tauri updater public key in apps/ui/src-tauri/tauri.conf.json (still contains "${placeholder}").`);
            console.error('Refusing to build production desktop artifacts until a real updater public key is configured.');
            process.exit(1);
          }
          NODE

      - name: Enable Corepack (Yarn)
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Install dependencies
        env:
          YARN_PRODUCTION: "false"
          npm_config_production: "false"
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.tauri_target }}

      - name: Import Apple codesigning certificate (macOS)
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE != '' && env.APPLE_CERTIFICATE_PASSWORD != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          keychain_path="${RUNNER_TEMP}/build.keychain-db"
          keychain_password="$(uuidgen)"

          cert_path="${RUNNER_TEMP}/apple-cert.p12"
          echo "${APPLE_CERTIFICATE}" | base64 --decode > "${cert_path}"

          security create-keychain -p "${keychain_password}" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "${keychain_password}" "${keychain_path}"
          existing_keychains=()
          while IFS= read -r line; do
            existing_keychains+=("${line}")
          done < <(security list-keychains -d user | tr -d '"')
          security list-keychains -d user -s "${keychain_path}" "${existing_keychains[@]}"

          security import "${cert_path}" -k "${keychain_path}" -P "${APPLE_CERTIFICATE_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "${keychain_password}" "${keychain_path}"

      - name: Resolve Apple signing identity (macOS)
        if: runner.os == 'macOS' && env.APPLE_CERTIFICATE != '' && env.APPLE_CERTIFICATE_PASSWORD != ''
        id: apple_id
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail
          identity="$(security find-identity -v -p codesigning 2>&1 | awk -F '"' '/Developer ID Application:/ { print $2; exit }')"
          if [ -z "${identity:-}" ]; then
            echo "Unable to find Developer ID Application identity after importing certificate." >&2
            security find-identity -v -p codesigning || true
            exit 1
          fi
          echo "identity=${identity}" >> "$GITHUB_OUTPUT"

      - name: Install Linux system dependencies (Tauri)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Compute build version
        id: ver
        run: |
          set -euo pipefail
          ui_version="$(node -p 'require("./apps/ui/package.json").version' | tr -d '\n')"
          if [ -z "${ui_version:-}" ]; then
            echo "Unable to resolve apps/ui/package.json version" >&2
            exit 1
          fi
          if [ "${{ inputs.environment }}" = "preview" ]; then
            preview_number="$(( GITHUB_RUN_NUMBER % 65535 ))"
            if [ "${preview_number}" -eq 0 ]; then
              preview_number=65535
            fi
            build_version="${ui_version}-${preview_number}"
          else
            build_version="${ui_version}"
          fi
          echo "ui_version=${ui_version}" >> "$GITHUB_OUTPUT"
          echo "build_version=${build_version}" >> "$GITHUB_OUTPUT"

      - name: Build desktop updater artifacts
        env:
          CI: "true"
          APP_ENV: ${{ inputs.environment }}
          TAURI_TARGET: ${{ matrix.tauri_target }}
          APPLE_SIGNING_IDENTITY: ${{ steps.apple_id.outputs.identity }}
          # Optional: updater signing. Add secrets to enable signing:
          # - TAURI_SIGNING_PRIVATE_KEY
          # - TAURI_SIGNING_PRIVATE_KEY_PASSWORD
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          yarn -s workspace @happier-dev/agents build
          yarn -s workspace @happier-dev/protocol build

          cd apps/ui

          if [ -n "${TAURI_TARGET}" ]; then
            rustup target add "${TAURI_TARGET}"
          fi

          target_args=()
          if [ -n "${TAURI_TARGET}" ]; then
            target_args+=(--target "${TAURI_TARGET}")
          fi

          configs=()

          # macOS codesigning (optional). If APPLE_CERTIFICATE is configured, sign the app during the build.
          if [ "${RUNNER_OS}" = "macOS" ] && [ -n "${APPLE_SIGNING_IDENTITY}" ]; then
            codesign_override="${RUNNER_TEMP}/tauri.codesign.override.json"
            node -e '
              const fs = require("node:fs");
              const path = process.argv[1];
              const signingIdentity = String(process.env.APPLE_SIGNING_IDENTITY ?? "");
              const payload = { bundle: { macOS: { signingIdentity, hardenedRuntime: true } } };
              fs.writeFileSync(path, `${JSON.stringify(payload)}\n`, "utf8");
            ' "${codesign_override}"
            configs+=(--config "${codesign_override}")
          fi

          if [ "${{ inputs.environment }}" = "preview" ]; then
            override=""
            if [ -n "${RUNNER_TEMP:-}" ]; then
              override="${RUNNER_TEMP}/tauri.version.override.json"
            elif override_tmp="$(mktemp 2>/dev/null)"; then
              override="${override_tmp}"
            else
              override="/tmp/tauri.version.override.json"
            fi
            if [ -z "${override:-}" ]; then
              echo "Unable to allocate a temp file path for Tauri version override." >&2
              exit 1
            fi
            mkdir -p "$(dirname "${override}")"
            touch "${override}" || {
              echo "Version override file path is not writable: ${override}" >&2
              exit 1
            }
            VERSION_OVERRIDE="${{ steps.ver.outputs.build_version }}" node -e '
              const fs = require("node:fs");
              const out = process.argv[1];
              const version = String(process.env.VERSION_OVERRIDE ?? "");
              fs.writeFileSync(out, `${JSON.stringify({ version })}\n`, "utf8");
            ' "${override}"
            preview_bundle_args=()
            if [ "${{ inputs.environment }}" = "preview" ] && [ "${RUNNER_OS}" = "macOS" ]; then
              preview_bundle_args+=(--bundles app)
            fi
            yarn tauri build --config src-tauri/tauri.preview.conf.json --config "${override}" "${preview_bundle_args[@]}" "${configs[@]}" "${target_args[@]}"
          else
            yarn tauri build "${configs[@]}" "${target_args[@]}"
          fi

      - name: Notarize macOS artifacts (updater + DMG) (macOS)
        if: runner.os == 'macOS' && inputs.environment == 'production' && env.APPLE_CERTIFICATE != '' && env.APPLE_CERTIFICATE_PASSWORD != '' && env.APPLE_API_KEY_ID != '' && env.APPLE_API_ISSUER_ID != '' && env.APPLE_API_PRIVATE_KEY != '' && env.TAURI_SIGNING_PRIVATE_KEY != '' && !contains(env.TAURI_SIGNING_PRIVATE_KEY, 'BEGIN PRIVATE KEY')
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_PRIVATE_KEY: ${{ secrets.APPLE_API_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          TAURI_TARGET: ${{ matrix.tauri_target }}
        run: |
          set -euo pipefail

          cd apps/ui

          base_dir="src-tauri/target"
          search_dir="${base_dir}"
          if [ -n "${TAURI_TARGET}" ]; then
            search_dir="${base_dir}/${TAURI_TARGET}"
          fi

          sig_matches=()
          while IFS= read -r match; do
            sig_matches+=("${match}")
          done < <(find "${search_dir}" -path '*/release/bundle/*' -type f -name '*.app.tar.gz.sig' | sort)
          if [ "${#sig_matches[@]}" -ne 1 ]; then
            echo "Expected exactly one macOS updater signature under ${search_dir}; found ${#sig_matches[@]}" >&2
            if [ "${#sig_matches[@]}" -gt 0 ]; then
              printf 'Matches:\n' >&2
              printf '  %s\n' "${sig_matches[@]}" >&2
            fi
            exit 1
          fi
          sig_path="${sig_matches[0]}"
          artifact_path="${sig_path%.sig}"
          if [ ! -f "${artifact_path}" ]; then
            echo "Missing updater artifact for signature: ${sig_path}" >&2
            exit 1
          fi

          key_path="${RUNNER_TEMP}/apple-notary.p8"
          normalized_notary_key="$(node -e 'const raw=String(process.env.APPLE_API_PRIVATE_KEY ?? ""); process.stdout.write(raw.includes("\\n") ? raw.replaceAll("\\n", "\n") : raw);')"
          if printf "%s" "${normalized_notary_key}" | grep -q "BEGIN PRIVATE KEY"; then
            printf "%s" "${normalized_notary_key}" > "${key_path}"
          else
            # Support storing the key as base64 (common for multi-line secrets).
            printf "%s" "${normalized_notary_key}" | base64 --decode > "${key_path}"
          fi
          chmod 600 "${key_path}"

          work="$(mktemp -d)"
          tar -xzf "${artifact_path}" -C "${work}"
          app_path="$(find "${work}" -maxdepth 3 -type d -name '*.app' | head -n 1 || true)"
          if [ -z "${app_path:-}" ]; then
            echo "Unable to find .app inside updater artifact: ${artifact_path}" >&2
            exit 1
          fi

          zip_path="${work}/app.zip"
          ditto -c -k --keepParent "${app_path}" "${zip_path}"
          xcrun notarytool submit "${zip_path}" --key "${key_path}" --key-id "${APPLE_API_KEY_ID}" --issuer "${APPLE_API_ISSUER_ID}" --wait --timeout 15m
          xcrun stapler staple "${app_path}"

          # Re-pack the tar.gz so the updater payload contains the stapled ticket.
          app_name="$(basename "${app_path}")"
          app_parent="$(dirname "${app_path}")"
          new_tar="${work}/notarized.app.tar.gz"
          tar -czf "${new_tar}" -C "${app_parent}" "${app_name}"
          mv "${new_tar}" "${artifact_path}"

          # Re-sign the updated archive so latest.json signature matches.
          artifact_abs="$(cd "$(dirname "${artifact_path}")" && pwd)/$(basename "${artifact_path}")"
          sig_abs="$(cd "$(dirname "${sig_path}")" && pwd)/$(basename "${sig_path}")"
          tmp_sig="${work}/notarized.sig"
          sign_key_path="${RUNNER_TEMP}/tauri-updater-signing-key.pem"
          normalized_tauri_signing_key="$(node -e 'const raw=String(process.env.TAURI_SIGNING_PRIVATE_KEY ?? ""); process.stdout.write(raw.includes("\\n") ? raw.replaceAll("\\n", "\n") : raw);')"
          if printf "%s" "${normalized_tauri_signing_key}" | grep -q "BEGIN"; then
            printf "%s" "${normalized_tauri_signing_key}" > "${sign_key_path}"
          else
            printf "%s" "${normalized_tauri_signing_key}" | base64 --decode > "${sign_key_path}"
          fi
          chmod 600 "${sign_key_path}"
          yarn --silent tauri signer sign --private-key-path "${sign_key_path}" --password "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD}" "${artifact_abs}" > "${tmp_sig}"
          sig_value="$(tr -d '\r\n' < "${tmp_sig}")"
          if [ -z "${sig_value}" ] || ! printf "%s" "${sig_value}" | grep -Eq '^[A-Za-z0-9+/=]+$'; then
            echo "Generated updater signature is invalid: ${tmp_sig}" >&2
            exit 1
          fi
          printf "%s\n" "${sig_value}" > "${tmp_sig}"
          mv "${tmp_sig}" "${sig_abs}"

          # Notarize DMG too (if present) so the installer is Gatekeeper-friendly.
          dmg_path="$(find "${search_dir}" -path '*/release/bundle/*' -type f -name '*.dmg' | head -n 1 || true)"
          if [ -n "${dmg_path:-}" ]; then
            xcrun notarytool submit "${dmg_path}" --key "${key_path}" --key-id "${APPLE_API_KEY_ID}" --issuer "${APPLE_API_ISSUER_ID}" --wait --timeout 15m
            xcrun stapler staple "${dmg_path}"
          fi

      - name: Fail when production notarization/signing secrets are missing (macOS)
        if: runner.os == 'macOS' && inputs.environment == 'production' && (env.APPLE_CERTIFICATE == '' || env.APPLE_CERTIFICATE_PASSWORD == '' || env.APPLE_API_KEY_ID == '' || env.APPLE_API_ISSUER_ID == '' || env.APPLE_API_PRIVATE_KEY == '' || env.TAURI_SIGNING_PRIVATE_KEY == '' || contains(env.TAURI_SIGNING_PRIVATE_KEY, 'BEGIN PRIVATE KEY'))
        run: |
          set -euo pipefail
          if [ "${APPLE_CERTIFICATE}" = "" ] || [ "${APPLE_CERTIFICATE_PASSWORD}" = "" ] || [ "${APPLE_API_KEY_ID}" = "" ] || [ "${APPLE_API_ISSUER_ID}" = "" ] || [ "${APPLE_API_PRIVATE_KEY}" = "" ] || [ "${TAURI_SIGNING_PRIVATE_KEY}" = "" ]; then
            echo "Missing required production macOS signing/notarization secrets." >&2
            echo "Required: APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_API_KEY_ID, APPLE_API_ISSUER_ID, APPLE_API_PRIVATE_KEY, TAURI_SIGNING_PRIVATE_KEY." >&2
            exit 1
          fi
          if printf "%s" "${TAURI_SIGNING_PRIVATE_KEY}" | grep -q "BEGIN PRIVATE KEY"; then
            echo "TAURI_SIGNING_PRIVATE_KEY is invalid for updater signing: minisign key required, not PEM private key." >&2
            echo "Generate updater keys with: yarn tauri signer generate (or tauri signer generate)." >&2
            exit 1
          fi
          echo "Missing required production macOS signing/notarization secrets." >&2
          echo "TAURI_SIGNING_PRIVATE_KEY must be minisign format, not PEM." >&2
          exit 1

      - name: Collect updater artifact + signature
        env:
          PLATFORM_KEY: ${{ matrix.platform_key }}
          UI_VERSION: ${{ steps.ver.outputs.ui_version }}
          BUILD_VERSION: ${{ steps.ver.outputs.build_version }}
          ENVIRONMENT: ${{ inputs.environment }}
          TAURI_TARGET: ${{ matrix.tauri_target }}
        run: |
          set -euo pipefail

          base_dir="apps/ui/src-tauri/target"
          search_dir="${base_dir}"
          if [ -n "${TAURI_TARGET}" ]; then
            search_dir="${base_dir}/${TAURI_TARGET}"
          fi

          sig_path=""
          case "${PLATFORM_KEY}" in
            windows-*)
              sig_matches=()
              while IFS= read -r match; do
                sig_matches+=("${match}")
              done < <(find "${search_dir}" -path '*/release/bundle/*' -type f \( -name '*.msi.sig' -o -name '*.exe.sig' -o -name '*.msi.zip.sig' -o -name '*.exe.zip.sig' -o -name '*.nsis.zip.sig' \) | sort)
              if [ "${#sig_matches[@]}" -lt 1 ]; then
                echo "Expected at least one updater signature for PLATFORM_KEY=${PLATFORM_KEY} under ${search_dir}; found 0" >&2
                exit 1
              fi
              preferred_sig=""
              for candidate in "${sig_matches[@]}"; do
                if [[ "${candidate}" == *-setup.exe.sig ]]; then
                  preferred_sig="${candidate}"
                  break
                fi
              done
              if [ -z "${preferred_sig}" ]; then
                for candidate in "${sig_matches[@]}"; do
                  if [[ "${candidate}" == *.exe.sig ]]; then
                    preferred_sig="${candidate}"
                    break
                  fi
                done
              fi
              if [ -z "${preferred_sig}" ]; then
                for candidate in "${sig_matches[@]}"; do
                  if [[ "${candidate}" == *.nsis.zip.sig ]]; then
                    preferred_sig="${candidate}"
                    break
                  fi
                done
              fi
              if [ -z "${preferred_sig}" ]; then
                for candidate in "${sig_matches[@]}"; do
                  if [[ "${candidate}" == *.msi.sig ]]; then
                    preferred_sig="${candidate}"
                    break
                  fi
                done
              fi
              if [ -z "${preferred_sig}" ]; then
                for candidate in "${sig_matches[@]}"; do
                  if [[ "${candidate}" == *.exe.zip.sig ]]; then
                    preferred_sig="${candidate}"
                    break
                  fi
                done
              fi
              if [ -z "${preferred_sig}" ]; then
                for candidate in "${sig_matches[@]}"; do
                  if [[ "${candidate}" == *.msi.zip.sig ]]; then
                    preferred_sig="${candidate}"
                    break
                  fi
                done
              fi
              if [ -z "${preferred_sig}" ]; then
                preferred_sig="${sig_matches[0]}"
              fi
              if [ "${#sig_matches[@]}" -gt 1 ]; then
                echo "Found multiple Windows updater signatures for ${PLATFORM_KEY}; using preferred artifact: ${preferred_sig}" >&2
                printf 'All matches:\n' >&2
                printf '  %s\n' "${sig_matches[@]}" >&2
              fi
              sig_path="${preferred_sig}"
              ;;
            darwin-*)
              sig_matches=()
              while IFS= read -r match; do
                sig_matches+=("${match}")
              done < <(find "${search_dir}" -path '*/release/bundle/*' -type f -name '*.app.tar.gz.sig' | sort)
              if [ "${#sig_matches[@]}" -ne 1 ]; then
                echo "Expected exactly one updater signature for PLATFORM_KEY=${PLATFORM_KEY} under ${search_dir}; found ${#sig_matches[@]}" >&2
                if [ "${#sig_matches[@]}" -gt 0 ]; then
                  printf 'Matches:\n' >&2
                  printf '  %s\n' "${sig_matches[@]}" >&2
                fi
                exit 1
              fi
              sig_path="${sig_matches[0]}"
              ;;
            linux-*)
              sig_matches=()
              while IFS= read -r match; do
                sig_matches+=("${match}")
              done < <(find "${search_dir}" -path '*/release/bundle/*' -type f \( -name '*.AppImage.sig' -o -name '*.appimage.sig' -o -name '*.AppImage.tar.gz.sig' -o -name '*.appimage.tar.gz.sig' \) | sort)
              if [ "${#sig_matches[@]}" -ne 1 ]; then
                echo "Expected exactly one updater signature for PLATFORM_KEY=${PLATFORM_KEY} under ${search_dir}; found ${#sig_matches[@]}" >&2
                if [ "${#sig_matches[@]}" -gt 0 ]; then
                  printf 'Matches:\n' >&2
                  printf '  %s\n' "${sig_matches[@]}" >&2
                fi
                exit 1
              fi
              sig_path="${sig_matches[0]}"
              ;;
            *)
              echo "Unknown platform_key: ${PLATFORM_KEY}" >&2
              exit 1
              ;;
          esac

          if [ -z "${sig_path:-}" ]; then
            echo "Unable to find updater signature under: ${search_dir}/**/release/bundle" >&2
            exit 1
          fi

          artifact_path="${sig_path%.sig}"
          if [ ! -f "${artifact_path}" ]; then
            echo "Missing updater artifact for signature: ${sig_path}" >&2
            exit 1
          fi

          artifact_filename="$(basename "${artifact_path}")"
          ext=""
          case "${artifact_filename}" in
            *.msi) ext=".msi" ;;
            *.exe) ext=".exe" ;;
            *.nsis) ext=".nsis" ;;
            *.msi.zip) ext=".msi.zip" ;;
            *.exe.zip) ext=".exe.zip" ;;
            *.nsis.zip) ext=".nsis.zip" ;;
            *.app.tar.gz) ext=".app.tar.gz" ;;
            *.AppImage.tar.gz) ext=".AppImage.tar.gz" ;;
            *.appimage.tar.gz) ext=".appimage.tar.gz" ;;
            *) ext=".${artifact_filename##*.}" ;;
          esac

          if [ "${ENVIRONMENT}" = "preview" ]; then
            out_base="happier-ui-preview-${PLATFORM_KEY}"
          else
            out_base="happier-ui-${PLATFORM_KEY}-v${UI_VERSION}"
          fi

          out_dir="dist/tauri/updates/${PLATFORM_KEY}"
          mkdir -p "${out_dir}"
          cp "${artifact_path}" "${out_dir}/${out_base}${ext}"
          cp "${sig_path}" "${out_dir}/${out_base}${ext}.sig"

          # Include macOS installer DMG (if present). Not referenced by latest.json (no .sig), but useful for manual installs.
          if [[ "${PLATFORM_KEY}" == darwin-* ]]; then
            dmg_path="$(find "${search_dir}" -path '*/release/bundle/*' -type f -name '*.dmg' | head -n 1 || true)"
            if [ -n "${dmg_path:-}" ]; then
              cp "${dmg_path}" "${out_dir}/${out_base}.dmg"
            fi
          fi

      - name: Upload updater assets artifact
        uses: actions/upload-artifact@v4
        with:
          name: tauri-updates-${{ matrix.platform_key }}
          path: dist/tauri/updates/${{ matrix.platform_key }}/**
          retention-days: 7

  prepare_assets:
    name: Prepare latest.json + publish assets
    runs-on: ubuntu-latest
    needs: [resolve_source, build]
    outputs:
      ui_version: ${{ steps.meta.outputs.ui_version }}
      target_sha: ${{ steps.meta.outputs.target_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve_source.outputs.source_sha }}
          fetch-depth: 1

      - name: Compute build metadata
        id: meta
        run: |
          set -euo pipefail
          ui_version="$(node -p 'require("./apps/ui/package.json").version' | tr -d '\n')"
          if [ -z "${ui_version:-}" ]; then
            echo "Unable to resolve apps/ui/package.json version" >&2
            exit 1
          fi
          echo "ui_version=${ui_version}" >> "$GITHUB_OUTPUT"
          echo "target_sha=${{ needs.resolve_source.outputs.source_sha }}" >> "$GITHUB_OUTPUT"

      - name: Download updater assets artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: tauri-updates-*
          path: dist/tauri/updates
          merge-multiple: true

      - name: Generate latest.json
        env:
          REPO: ${{ env.UI_REPO }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          set -euo pipefail

          ui_version="${{ steps.meta.outputs.ui_version }}"
          if [ "${ENVIRONMENT}" = "preview" ]; then
            version="${ui_version}-preview.${GITHUB_RUN_NUMBER}"
            release_tag="ui-preview"
            notes="Rolling preview build."
          else
            version="${ui_version}"
            release_tag="ui-v${ui_version}"
            notes="See the UI release notes for details."
          fi

          pub_date="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"

          mkdir -p dist/tauri/publish
          node apps/ui/tools/tauri/make-latest-json.mjs \
            --channel "${ENVIRONMENT}" \
            --version "${version}" \
            --pub-date "${pub_date}" \
            --notes "${notes}" \
            --repo "${REPO}" \
            --release-tag "${release_tag}" \
            --artifacts-dir "dist/tauri/updates" \
            --out "dist/tauri/publish/latest.json"

          # Assemble per-release payloads.
          if [ "${ENVIRONMENT}" = "preview" ]; then
            mkdir -p dist/tauri/publish/ui-preview
            cp dist/tauri/publish/latest.json dist/tauri/publish/ui-preview/latest.json
            cp -R dist/tauri/updates/* dist/tauri/publish/ui-preview/
          else
            mkdir -p dist/tauri/publish/ui-v dist/tauri/publish/ui-stable
            cp dist/tauri/publish/latest.json dist/tauri/publish/ui-stable/latest.json
            cp -R dist/tauri/updates/* dist/tauri/publish/ui-v/
          fi

      - name: Upload publish assets artifact
        uses: actions/upload-artifact@v4
        with:
          name: ui-desktop-assets
          path: dist/tauri/publish/**
          retention-days: 7

  publish_preview:
    if: ${{ inputs.publish_release == true && inputs.environment == 'preview' }}
    needs: [prepare_assets]
    uses: ./.github/workflows/publish-ui-release.yml
    secrets: inherit
    with:
      tag: ui-preview
      title: UI Preview
      target_sha: ${{ needs.prepare_assets.outputs.target_sha }}
      prerelease: true
      rolling_tag: true
      generate_notes: false
      notes: Rolling preview build.
      assets_artifact: ui-desktop-assets
      assets_artifact_path: dist/ui-desktop-assets
      assets_dir: dist/ui-desktop-assets/ui-preview
      clobber: true

  publish_stable_release:
    if: ${{ inputs.publish_release == true && inputs.environment == 'production' }}
    needs: [prepare_assets]
    uses: ./.github/workflows/publish-ui-release.yml
    secrets: inherit
    with:
      tag: ui-v${{ needs.prepare_assets.outputs.ui_version }}
      title: UI v${{ needs.prepare_assets.outputs.ui_version }}
      target_sha: ${{ needs.prepare_assets.outputs.target_sha }}
      prerelease: false
      rolling_tag: false
      generate_notes: true
      assets_artifact: ui-desktop-assets
      assets_artifact_path: dist/ui-desktop-assets
      assets_dir: dist/ui-desktop-assets/ui-v
      clobber: true

  publish_stable_feed:
    if: ${{ inputs.publish_release == true && inputs.environment == 'production' }}
    needs: [prepare_assets]
    uses: ./.github/workflows/publish-ui-release.yml
    secrets: inherit
    with:
      tag: ui-stable
      title: UI Stable
      target_sha: ${{ needs.prepare_assets.outputs.target_sha }}
      prerelease: false
      rolling_tag: true
      generate_notes: false
      notes: Stable update feed.
      assets_artifact: ui-desktop-assets
      assets_artifact_path: dist/ui-desktop-assets
      assets_dir: dist/ui-desktop-assets/ui-stable
      clobber: true
