name: PROMOTE — UI (deploy branch + optional Expo)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target — Environment (deploy branch)"
        required: true
        type: choice
        options:
          - preview
          - production
      run_tests:
        description: "Checks — Run apps/ui tests before promoting"
        required: true
        default: true
        type: boolean
      source_ref:
        description: "Promotion — Source ref to promote (branch, tag, or SHA). Use 'auto' to default preview→dev, production→main."
        required: true
        default: auto
        type: string
      allow_cross_promote:
        description: "Safety — Allow promoting a non-default source ref to the selected environment (use with care)."
        required: true
        default: false
        type: boolean
      bump:
        description: "Versions — Version bump on source ref (app)"
        required: true
        default: none
        type: choice
        options:
          - none
          - patch
          - minor
          - major
      deploy_web:
        description: "Deploy — Promote deploy/<env>/ui (web deploy on push)"
        required: true
        default: true
        type: boolean
      expo_action:
        description: "Deploy (Expo) — Action (requires EXPO_TOKEN secret)"
        required: true
        default: none
        type: choice
        options:
          - none
          - ota
          - native
          - native_submit
      expo_profile:
        description: "Deploy (Expo) — EAS build profile (auto: preview→preview, production→production). Use *-apk profiles to produce installable Android APKs and publish to GitHub Releases."
        required: true
        default: auto
        type: choice
        options:
          - auto
          - preview
          - preview-apk
          - production
          - production-apk
      expo_platform:
        description: "Deploy (Expo) — Native build platform"
        required: true
        default: all
        type: choice
        options:
          - ios
          - android
          - all
      desktop_build:
        description: "Deploy (Desktop) — Build Tauri desktop bundles (macOS/Windows/Linux)"
        required: true
        default: false
        type: boolean
      desktop_publish_release:
        description: "Deploy (Desktop) — Upload desktop bundles to GitHub Releases"
        required: true
        default: true
        type: boolean
  workflow_call:
    inputs:
      environment:
        description: "Target — Environment (deploy branch)"
        required: true
        type: string
      run_tests:
        description: "Checks — Run apps/ui tests before promoting"
        required: false
        default: true
        type: boolean
      source_ref:
        description: "Promotion — Source ref to promote (branch, tag, or SHA). Use 'auto' to default preview→dev, production→main."
        required: false
        default: auto
        type: string
      allow_cross_promote:
        description: "Safety — Allow promoting a non-default source ref to the selected environment (use with care)."
        required: false
        default: false
        type: boolean
      bump:
        description: "Versions — Version bump on source ref (app)"
        required: false
        default: none
        type: string
      deploy_web:
        description: "Deploy — Promote deploy/<env>/ui (web deploy on push)"
        required: false
        default: true
        type: boolean
      expo_action:
        description: "Deploy (Expo) — Action (requires EXPO_TOKEN secret)"
        required: false
        default: none
        type: string
      expo_profile:
        description: "Deploy (Expo) — EAS build profile (auto: preview→preview, production→production). Use *-apk profiles to produce installable Android APKs and publish to GitHub Releases."
        required: false
        default: auto
        type: string
      expo_platform:
        description: "Deploy (Expo) — Native build platform"
        required: false
        default: all
        type: string
      desktop_build:
        description: "Deploy (Desktop) — Build Tauri desktop bundles (macOS/Windows/Linux)"
        required: false
        default: false
        type: boolean
      desktop_publish_release:
        description: "Deploy (Desktop) — Upload desktop bundles to GitHub Releases"
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: promote-ui-${{ github.ref }}
  cancel-in-progress: false

jobs:
  promote:
    runs-on: ubuntu-latest
    environment: release-shared
    outputs:
      source_ref: ${{ steps.resolve.outputs.ref }}
      release_sha: ${{ steps.release_sha.outputs.sha }}
      mobile_tag: ${{ steps.mobile_meta.outputs.tag }}
      mobile_title: ${{ steps.mobile_meta.outputs.title }}
      mobile_prerelease: ${{ steps.mobile_meta.outputs.prerelease }}
      mobile_rolling_tag: ${{ steps.mobile_meta.outputs.rolling_tag }}
      mobile_generate_notes: ${{ steps.mobile_meta.outputs.generate_notes }}
      mobile_notes: ${{ steps.mobile_meta.outputs.notes }}
      mobile_publish: ${{ steps.mobile_meta.outputs.publish }}
    steps:
      - name: Resolve source ref
        id: resolve
        run: |
          set -euo pipefail
          env_name="${{ inputs.environment }}"
          src="${{ inputs.source_ref }}"
          if [ "$src" = "auto" ]; then
            if [ "$env_name" = "preview" ]; then
              src="dev"
            else
              src="main"
            fi
          fi

          # Guardrails: allow using non-default source ref only when explicitly confirmed.
          if [ "$env_name" = "production" ] && [ "$src" != "main" ] && [ "${{ inputs.allow_cross_promote }}" != "true" ]; then
            echo "Refusing to promote '$src' to production without allow_cross_promote=true." >&2
            exit 1
          fi

          # Bumps require a real branch target we can push back to.
          if [ "${{ inputs.bump }}" != "none" ] && [ "$src" != "main" ] && [ "$src" != "dev" ]; then
            echo "Refusing to bump versions when source_ref is not a branch (main/dev). Set bump=none or use a branch." >&2
            exit 1
          fi

          echo "ref=$src" >> "$GITHUB_OUTPUT"

      - name: Enforce trusted refs for manual dispatch
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]; then
            exit 0
          fi
          case "${GITHUB_REF_NAME}" in
            dev|main) ;;
            *)
              echo "Refusing workflow_dispatch from untrusted ref '${GITHUB_REF_NAME}'. Use dev or main." >&2
              exit 1
              ;;
          esac

      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Checkout source ref
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.resolve.outputs.ref }}
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Enable Corepack (Yarn)
        run: |
          set -euo pipefail
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Install dependencies
        env:
          YARN_PRODUCTION: "false"
          npm_config_production: "false"
        run: yarn install --frozen-lockfile --ignore-engines

      - name: Bump app version (source ref)
        id: bump_app
        run: |
          set -euo pipefail
          out="$(node scripts/release/bump-version.mjs --component app --bump "${{ inputs.bump }}")"
          if [ "$out" = "SKIP" ]; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skipped=false" >> "$GITHUB_OUTPUT"
          echo "version=$out" >> "$GITHUB_OUTPUT"

      - name: Run app tests
        if: inputs.run_tests
        run: |
          yarn --cwd apps/ui test:unit
          yarn --cwd apps/ui test:integration

      - name: Commit version bump (source ref)
        if: steps.bump_app.outputs.skipped != 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/ui/package.json apps/ui/app.config.js
          if [ -d apps/ui/src-tauri ]; then
            git add apps/ui/src-tauri || true
          fi
          git commit -m "chore(release): bump app to v${{ steps.bump_app.outputs.version }}"

      - name: Push source ref (only for branches)
        if: steps.bump_app.outputs.skipped != 'true'
        run: |
          set -euo pipefail
          src="${{ steps.resolve.outputs.ref }}"
          if git show-ref --verify --quiet "refs/remotes/origin/$src"; then
            git push origin "HEAD:refs/heads/$src"
          else
            echo "Skipping push: '$src' is not a known branch ref."
          fi

      - name: Capture release SHA
        id: release_sha
        run: |
          set -euo pipefail
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Expo OTA update
        if: inputs.expo_action == 'ota'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APP_ENV: ${{ inputs.environment }}
        run: |
          set -euo pipefail
          if [ -z "${EXPO_TOKEN:-}" ]; then
            echo "EXPO_TOKEN is required for Expo actions." >&2
            exit 1
          fi
          if [ "${{ inputs.environment }}" = "production" ]; then
            yarn --cwd apps/ui ota:production
          else
            yarn --cwd apps/ui ota
          fi

      - name: Resolve Expo build profile
        id: expo_profile
        if: inputs.expo_action == 'native' || inputs.expo_action == 'native_submit'
        run: |
          set -euo pipefail
          env_name="${{ inputs.environment }}"
          action="${{ inputs.expo_action }}"
          profile="${{ inputs.expo_profile }}"

          if [ "${profile}" = "auto" ]; then
            profile="${env_name}"
          fi

          echo "profile=${profile}" >> "$GITHUB_OUTPUT"
          {
            echo "### Expo"
            echo "- action: \`${action}\`"
            echo "- environment: \`${env_name}\`"
            echo "- build profile: \`${profile}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Expo native build
        if: inputs.expo_action == 'native' || inputs.expo_action == 'native_submit'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APP_ENV: ${{ inputs.environment }}
        run: |
          set -euo pipefail
          if [ -z "${EXPO_TOKEN:-}" ]; then
            echo "EXPO_TOKEN is required for Expo actions." >&2
            exit 1
          fi
          cd apps/ui
          npx --yes eas-cli@14.2.0 build --platform "${{ inputs.expo_platform }}" --profile "${{ steps.expo_profile.outputs.profile }}" --non-interactive --json > /tmp/eas_build.json

      - name: Download Android APK (EAS *-apk profiles)
        id: download_apk
        if: ${{ (inputs.expo_action == 'native' || inputs.expo_action == 'native_submit') && (inputs.expo_platform == 'android' || inputs.expo_platform == 'all') && endsWith(steps.expo_profile.outputs.profile, '-apk') }}
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APP_ENV: ${{ inputs.environment }}
        run: |
          set -euo pipefail

          if [ -z "${EXPO_TOKEN:-}" ]; then
            echo "EXPO_TOKEN is required for Expo actions." >&2
            exit 1
          fi

          env_name="${{ inputs.environment }}"

          if [ ! -s /tmp/eas_build.json ]; then
            echo "Missing /tmp/eas_build.json from EAS build step." >&2
            exit 1
          fi

          build_meta="$(node - <<'NODE'
          const fs = require('node:fs');
          const raw = fs.readFileSync('/tmp/eas_build.json', 'utf8').trim();
          if (!raw) process.exit(2);
          const parsed = JSON.parse(raw);
          const builds = Array.isArray(parsed) ? parsed : [parsed];
          const android = builds.find(b => (b?.platform || '').toLowerCase() === 'android') ?? null;
          if (!android) {
            console.error('No Android build found in EAS output');
            process.exit(4);
          }
          const id = android?.id || android?.buildId;
          if (!id) process.exit(3);
          const artifactUrl =
            android?.artifacts?.applicationArchiveUrl ||
            android?.artifacts?.buildUrl ||
            android?.artifacts?.url ||
            android?.artifactUrl ||
            android?.applicationArchiveUrl ||
            '';
          process.stdout.write(`${String(id)}\t${String(artifactUrl)}`);
          NODE
          )"
          build_id="${build_meta%%$'\t'*}"
          artifact_url=""
          if [ "${build_meta}" != "${build_id}" ]; then
            artifact_url="${build_meta#*$'\t'}"
          fi

          mkdir -p /tmp/eas
          apk_path="/tmp/eas/happier-${env_name}-android.apk"

          if [ -z "${artifact_url:-}" ]; then
            build_view_json="$(
              cd apps/ui
                  npx --yes eas-cli@14.2.0 build:view "${build_id}" --json
            )"
            artifact_url="$(
              BUILD_VIEW_JSON="${build_view_json}" node - <<'NODE'
              const raw = (process.env.BUILD_VIEW_JSON ?? '').trim();
              if (!raw) process.exit(2);
              const parsed = JSON.parse(raw);
              const build = Array.isArray(parsed) ? parsed[0] : parsed;
              const url =
                build?.artifacts?.applicationArchiveUrl ||
                build?.artifacts?.buildUrl ||
                build?.artifacts?.url ||
                build?.artifactUrl ||
                build?.applicationArchiveUrl ||
                '';
              if (!url) process.exit(3);
              process.stdout.write(String(url));
              NODE
            )" || {
              echo "Unable to resolve Android artifact URL for EAS build ${build_id}" >&2
              exit 1
            }
          fi

          case "${artifact_url}" in
            https://*) ;;
            *)
              echo "Resolved Android artifact URL is not https: ${artifact_url}" >&2
              exit 1
              ;;
          esac

          curl -fL --retry 3 --retry-all-errors --retry-delay 2 --max-time 300 "${artifact_url}" -o "${apk_path}"

          if [ ! -f "${apk_path}" ]; then
            echo "APK download failed; expected file at: ${apk_path}" >&2
            exit 1
          fi
          apk_size_bytes="$(wc -c < "${apk_path}" | tr -d '[:space:]')"
          if [ "${apk_size_bytes}" -lt 1000000 ]; then
            echo "Downloaded APK is unexpectedly small (${apk_size_bytes} bytes): ${apk_path}" >&2
            exit 1
          fi
          if ! unzip -tq "${apk_path}" >/dev/null 2>&1; then
            echo "Downloaded APK archive failed ZIP integrity check: ${apk_path}" >&2
            exit 1
          fi

          mkdir -p dist/ui-mobile

          app_version="$(node -p "require('./apps/ui/package.json').version")"
          if [ -z "${app_version:-}" ]; then
            echo "Unable to resolve app version from apps/ui/package.json" >&2
            exit 1
          fi

          if [ "${env_name}" = "production" ]; then
            out="dist/ui-mobile/happier-production-android-v${app_version}.apk"
          else
            out="dist/ui-mobile/happier-preview-android.apk"
          fi

          cp "${apk_path}" "${out}"
          echo "app_version=${app_version}" >> "$GITHUB_OUTPUT"
          echo "asset_path=${out}" >> "$GITHUB_OUTPUT"

      - name: Warn when *-apk profile excludes Android platform
        if: ${{ (inputs.expo_action == 'native' || inputs.expo_action == 'native_submit') && endsWith(steps.expo_profile.outputs.profile, '-apk') && !(inputs.expo_platform == 'android' || inputs.expo_platform == 'all') }}
        run: |
          echo "::warning::expo_profile '${{ steps.expo_profile.outputs.profile }}' targets APK artifacts, but expo_platform='${{ inputs.expo_platform }}' excludes Android. Mobile APK release will be skipped."

      - name: Upload mobile release assets artifact
        if: steps.download_apk.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: ui-mobile-assets
          path: dist/ui-mobile/**
          retention-days: 7

      - name: Compute mobile release metadata
        id: mobile_meta
        if: inputs.expo_action == 'native' || inputs.expo_action == 'native_submit'
        env:
          DOWNLOAD_APK_OUTCOME: ${{ steps.download_apk.outcome }}
        run: |
          set -euo pipefail

          if [ "${DOWNLOAD_APK_OUTCOME:-}" != "success" ]; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "title=" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "rolling_tag=false" >> "$GITHUB_OUTPUT"
            echo "generate_notes=false" >> "$GITHUB_OUTPUT"
            echo "notes=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          env_name="${{ inputs.environment }}"
          app_version="${{ steps.download_apk.outputs.app_version }}"
          echo "publish=true" >> "$GITHUB_OUTPUT"

          if [ "${env_name}" = "production" ]; then
            echo "tag=ui-v${app_version}" >> "$GITHUB_OUTPUT"
            echo "title=UI v${app_version}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "rolling_tag=false" >> "$GITHUB_OUTPUT"
            echo "generate_notes=true" >> "$GITHUB_OUTPUT"
            echo "notes=" >> "$GITHUB_OUTPUT"
          else
            echo "tag=ui-preview" >> "$GITHUB_OUTPUT"
            echo "title=UI Preview" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "rolling_tag=true" >> "$GITHUB_OUTPUT"
            echo "generate_notes=false" >> "$GITHUB_OUTPUT"
            echo "notes=Rolling preview build." >> "$GITHUB_OUTPUT"
          fi

      - name: Expo submit
        if: inputs.expo_action == 'native_submit'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${EXPO_TOKEN:-}" ]; then
            echo "EXPO_TOKEN is required for Expo actions." >&2
            exit 1
          fi
          cd apps/ui
          npx --yes eas-cli@14.2.0 submit --platform "${{ inputs.expo_platform }}" --latest --non-interactive

      - name: Promote source ref to deploy branch (web)
        if: inputs.deploy_web
        env:
          DEPLOY_REF: deploy/${{ inputs.environment }}/ui
        run: |
          set -euo pipefail
          remote_sha="$(git ls-remote --heads origin "$DEPLOY_REF" | awk '{print $1}')"
          if [ -n "$remote_sha" ]; then
            git push origin HEAD:"$DEPLOY_REF" --force-with-lease="refs/heads/$DEPLOY_REF:$remote_sha"
          else
            git push origin HEAD:"$DEPLOY_REF"
          fi

  publish_mobile:
    name: Publish mobile assets (GitHub Release)
    if: ${{ needs.promote.outputs.mobile_publish == 'true' }}
    needs: [promote]
    permissions:
      contents: write
    uses: ./.github/workflows/publish-ui-release.yml
    secrets: inherit
    with:
      tag: ${{ needs.promote.outputs.mobile_tag }}
      title: ${{ needs.promote.outputs.mobile_title }}
      target_sha: ${{ needs.promote.outputs.release_sha }}
      prerelease: ${{ needs.promote.outputs.mobile_prerelease == 'true' }}
      rolling_tag: ${{ needs.promote.outputs.mobile_rolling_tag == 'true' }}
      generate_notes: ${{ needs.promote.outputs.mobile_generate_notes == 'true' }}
      notes: ${{ needs.promote.outputs.mobile_notes }}
      assets_artifact: ui-mobile-assets
      assets_artifact_path: dist/ui-mobile
      assets_dir: dist/ui-mobile
      clobber: true

  desktop:
    name: Desktop bundles (Tauri)
    if: ${{ inputs.desktop_build == true }}
    needs: [promote]
    permissions:
      contents: write
    uses: ./.github/workflows/build-tauri.yml
    secrets: inherit
    with:
      environment: ${{ inputs.environment }}
      source_ref: ${{ needs.promote.outputs.release_sha }}
      publish_release: ${{ inputs.desktop_publish_release }}
